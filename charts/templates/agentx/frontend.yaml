{{- if $.Values.agentx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: agentx-frontend
spec:
  selector:
    app: agentx-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentx-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentx-frontend
  template:
    metadata:
      labels:
        app: agentx-frontend
    spec:
      containers:
        - name: agentx-frontend
          image: {{ .Values.global.repository }}public/dev:agentx-frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentx-frontend
spec:
  parentRefs:
    - name: {{ $.Values.global.gateway }}
      namespace: {{ $.Values.global.gatewayNamespace }}
  hostnames:
    - "agentx-dev.{{ $.Values.global.wildcardHost }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: agentx-frontend
          port: 80
{{- end }}

  # ============================================================================
  # SECTION 7: KUBERNETES RESOURCES - EnvoyGateway + Gateway + App Resources
  # ============================================================================

  # Lambda to fetch and install EnvoyGateway from release manifests
  EnvoyGatewayInstaller:
    Type: AWS::Lambda::Function
    DependsOn:
      - LambdaAccessEntry
      - ClusterSGIngressFromLambda
      - AddonCoreDns
      - AddonKubeProxy
      - AddonMetricsServer
    Properties:
      FunctionName: !Sub "${ProjectName}${EnvironmentId}-eg-installer"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 900
      MemorySize: 1024
      Role: !GetAtt KubectlLambdaRole.Arn
      Code:
        ZipFile: |
          import base64,json,logging,tempfile,time,urllib3,boto3,re
          from botocore.signers import RequestSigner
          L=logging.getLogger();L.setLevel(logging.INFO)
          def get_token(sess,cluster,region):
            sts=sess.client("sts",region_name=region);si=sts.meta.service_model.service_id
            sg=RequestSigner(si,region,"sts","v4",sess.get_credentials(),sess.events)
            p={"method":"GET","url":f"https://sts.{region}.amazonaws.com/?Action=GetCallerIdentity&Version=2011-06-15","body":{},"headers":{"x-k8s-aws-id":cluster},"context":{}}
            u=sg.generate_presigned_url(p,region_name=region,expires_in=60,operation_name="")
            return "k8s-aws-v1."+base64.urlsafe_b64encode(u.encode()).decode().rstrip("=")
          PLURALS={"BackendLBPolicy":"backendlbpolicies","GatewayClass":"gatewayclasses","HTTPRoute":"httproutes","GRPCRoute":"grpcroutes","TCPRoute":"tcproutes","TLSRoute":"tlsroutes","ReferenceGrant":"referencegrants","BackendTLSPolicy":"backendtlspolicies","EnvoyProxy":"envoyproxies","SecurityPolicy":"securitypolicies","BackendTrafficPolicy":"backendtrafficpolicies","ClientTrafficPolicy":"clienttrafficpolicies","EnvoyExtensionPolicy":"envoyextensionpolicies","EnvoyPatchPolicy":"envoypatchpolicies","HTTPRouteFilter":"httproutefilters","Backend":"backends","Namespace":"namespaces","Service":"services","ServiceAccount":"serviceaccounts","Deployment":"deployments","ConfigMap":"configmaps","Secret":"secrets","CustomResourceDefinition":"customresourcedefinitions","ClusterRole":"clusterroles","ClusterRoleBinding":"clusterrolebindings","Role":"roles","RoleBinding":"rolebindings","ValidatingWebhookConfiguration":"validatingwebhookconfigurations","MutatingWebhookConfiguration":"mutatingwebhookconfigurations","Gateway":"gateways","NodePool":"nodepools","NodeClass":"nodeclasses"}
          NONNS={"Namespace","CustomResourceDefinition","ClusterRole","ClusterRoleBinding","GatewayClass","ValidatingWebhookConfiguration","MutatingWebhookConfiguration","PriorityClass","StorageClass"}
          def extract_meta(doc):
            """Extract apiVersion, kind, name, namespace from raw YAML text using regex."""
            av=re.search(r'^apiVersion:\s*(.+)',doc,re.M)
            kd=re.search(r'^kind:\s*(.+)',doc,re.M)
            nm=re.search(r'^\s{2}name:\s*(.+)',doc,re.M)
            ns=re.search(r'^\s{2}namespace:\s*(.+)',doc,re.M)
            if not av or not kd or not nm:return None
            def _unquote(s):return s.strip().strip("'\"")
            return _unquote(av.group(1)),_unquote(kd.group(1)),_unquote(nm.group(1)),_unquote(ns.group(1)) if ns else None
          def rpath(av,kind,ns):
            pl=PLURALS.get(kind,kind.lower()+"s")
            px=f"apis/{av}" if "/" in av else f"api/{av}"
            if kind in NONNS or not ns:return f"/{px}/{pl}"
            return f"/{px}/namespaces/{ns}/{pl}"
          def apply_yaml_doc(http,ep,token,doc,av,kind,name,ns,retries=40):
            """Apply a single YAML document to K8s API with retry."""
            p=rpath(av,kind,ns)
            hd={"Authorization":f"Bearer {token}","Content-Type":"application/yaml","Accept":"application/json"}
            for attempt in range(retries):
              r=http.request("POST",f"{ep}{p}",headers=hd,body=doc.encode("utf-8"),timeout=30)
              if r.status in(409,422):
                hd2={**hd,"Content-Type":"application/apply-patch+yaml"}
                r=http.request("PATCH",f"{ep}{p}/{name}?fieldManager=cfn&force=true",headers=hd2,body=doc.encode("utf-8"),timeout=30)
                if 200<=r.status<300:return "updated",r.status
              if 200<=r.status<300:return "created",r.status
              wait=min(30,5*(attempt+1))
              L.warning(f"{r.status} on {kind}/{name}, retry {attempt+1}/{retries} in {wait}s")
              time.sleep(wait)
            return "error",r.status
          def send_cfn(event,ctx,status,data=None,reason=None,pid=None):
            body=json.dumps({"Status":status,"Reason":reason or f"Logs: {ctx.log_stream_name}","PhysicalResourceId":pid or event.get("PhysicalResourceId",ctx.log_stream_name),"StackId":event["StackId"],"RequestId":event["RequestId"],"LogicalResourceId":event["LogicalResourceId"],"Data":data or {}})
            urllib3.PoolManager().request("PUT",event["ResponseURL"],body=body.encode(),headers={"Content-Type":""})
          def handler(event,ctx):
            L.info(json.dumps(event,default=str))
            rt=event["RequestType"];props=event["ResourceProperties"]
            # For Delete: clean up envoy-gateway-system namespace then signal SUCCESS
            if rt=="Delete":
              try:
                cn=props["ClusterName"];region=props.get("Region",boto3.session.Session().region_name)
                sess=boto3.Session(region_name=region)
                eks=sess.client("eks");ci=eks.describe_cluster(name=cn)["cluster"]
                ep=ci["endpoint"];ca=ci["certificateAuthority"]["data"]
                tf=tempfile.NamedTemporaryFile(delete=False,suffix=".crt")
                tf.write(base64.b64decode(ca));tf.flush();tf.close()
                http=urllib3.PoolManager(cert_reqs="CERT_REQUIRED",ca_certs=tf.name,timeout=urllib3.Timeout(connect=10,read=10))
                token=get_token(sess,cn,region)
                hd={"Authorization":f"Bearer {token}","Accept":"application/json"}
                http.request("DELETE",f"{ep}/api/v1/namespaces/envoy-gateway-system",headers=hd)
                L.info("Deleted envoy-gateway-system namespace, waiting for cleanup...")
                for w in range(60):
                  if ctx.get_remaining_time_in_millis()<30000:break
                  token=get_token(sess,cn,region)
                  hd={"Authorization":f"Bearer {token}","Accept":"application/json"}
                  r=http.request("GET",f"{ep}/api/v1/namespaces/envoy-gateway-system",headers=hd)
                  if r.status==404:L.info("envoy-gateway-system fully removed");break
                  L.info(f"Waiting for ns deletion, attempt {w+1}");time.sleep(10)
              except Exception as de:
                L.warning(f"Delete cleanup (non-fatal): {de}")
              send_cfn(event,ctx,"SUCCESS",pid=event.get("PhysicalResourceId",ctx.log_stream_name))
              return
            try:
              cn=props["ClusterName"];region=props.get("Region",boto3.session.Session().region_name)
              version=props.get("Version","v1.4.0")
              sess=boto3.Session(region_name=region)
              eks=sess.client("eks");ci=eks.describe_cluster(name=cn)["cluster"]
              ep=ci["endpoint"];ca=ci["certificateAuthority"]["data"]
              tf=tempfile.NamedTemporaryFile(delete=False,suffix=".crt")
              tf.write(base64.b64decode(ca));tf.flush();tf.close()
              http=urllib3.PoolManager(cert_reqs="CERT_REQUIRED",ca_certs=tf.name)
              token=get_token(sess,cn,region)
              if rt in("Create","Update"):
                L.info(f"Fetching EnvoyGateway {version} install manifest...")
                ext=urllib3.PoolManager()
                url=f"https://github.com/envoyproxy/gateway/releases/download/{version}/install.yaml"
                r=ext.request("GET",url,redirect=True,timeout=120)
                if r.status!=200:
                  send_cfn(event,ctx,"FAILED",reason=f"Failed fetch EG: HTTP {r.status}");return
                raw=r.data.decode("utf-8")
                # Split multi-document YAML on --- separator; strip Helm-style leading comment blocks
                def _strip_comments(s):
                  lines=s.strip().splitlines()
                  for i,l in enumerate(lines):
                    if l.strip() and not l.strip().startswith("#"):return "\n".join(lines[i:]).strip()
                  return ""
                docs=[_strip_comments(d) for d in re.split(r'^---\s*$',raw,flags=re.M) if d.strip()]
                docs=[d for d in docs if d and d.startswith("apiVersion")]
                L.info(f"Split into {len(docs)} YAML documents")
                # Sort: Namespace first, then CRD, then everything else (ensures ns exists before namespaced resources)
                def _sort_key(d):
                  m=extract_meta(d)
                  if not m: return 2
                  kind=m[1]
                  if kind=="Namespace": return 0
                  if kind=="CustomResourceDefinition": return 1
                  return 2
                docs.sort(key=_sort_key)
                # Apply Namespaces first with a brief wait to ensure they propagate
                ns_applied=False
                ok=0;fail=0;skip=0
                for doc in docs:
                  meta=extract_meta(doc)
                  if not meta:skip+=1;continue
                  av,kind,name,ns=meta
                  a,s=apply_yaml_doc(http,ep,token,doc,av,kind,name,ns)
                  if a=="error":
                    L.error(f"ERR {kind}/{name} HTTP {s}");fail+=1
                  else:
                    ok+=1
                    if kind=="Namespace" and not ns_applied:
                      ns_applied=True;time.sleep(3)  # Brief pause after namespace creation
                  if (ok+fail)%10==0:L.info(f"Progress: {ok} ok, {fail} fail, {skip} skip")
                L.info(f"EnvoyGateway install done: {ok} ok, {fail} fail, {skip} skip")
                if fail>10:
                  send_cfn(event,ctx,"FAILED",reason=f"Too many failures: {fail}");return
                send_cfn(event,ctx,"SUCCESS",data={"Ok":str(ok),"Fail":str(fail)},pid=f"{cn}-envoy-gateway")
            except Exception as e:
              L.exception("fail")
              send_cfn(event,ctx,"FAILED",reason=str(e)[:256])

  # Custom Resource: Install EnvoyGateway
  InstallEnvoyGateway:
    Type: Custom::EnvoyGatewayInstall
    DependsOn:
      - AddonCoreDns
      - AddonKubeProxy
      - AddonVpcCni
      - AddonPodIdentity
    Properties:
      ServiceToken: !GetAtt EnvoyGatewayInstaller.Arn
      ClusterName: !Ref EksCluster
      Region: !Ref "AWS::Region"
      Version: !Ref EnvoyGatewayVersion

  # Custom Resource: Create namespace, GatewayClass, EnvoyProxy, Gateway
  K8sInfraResources:
    Type: Custom::K8sInfra
    DependsOn:
      - InstallEnvoyGateway
      - EfsCsiPodIdentityAssoc
      - K8sNodePools
    Properties:
      ServiceToken: !GetAtt KubectlFunction.Arn
      RestartDeployments: "kube-system/efs-csi-controller"
      ClusterName: !Ref EksCluster
      Region: !Ref "AWS::Region"
      Manifests:
        # --- GatewayClass ---
        - apiVersion: gateway.networking.k8s.io/v1
          kind: GatewayClass
          metadata:
            name: !Sub "cnf-${EnvironmentId}-eg"
          spec:
            controllerName: gateway.envoyproxy.io/gatewayclass-controller
            parametersRef:
              group: gateway.envoyproxy.io
              kind: EnvoyProxy
              name: custom-proxy-config
              namespace: envoy-gateway-system
        # --- EnvoyProxy (custom config for IPv6 + NLB) ---
        - apiVersion: gateway.envoyproxy.io/v1alpha1
          kind: EnvoyProxy
          metadata:
            name: custom-proxy-config
            namespace: envoy-gateway-system
          spec:
            ipFamily: IPv6
            provider:
              type: Kubernetes
              kubernetes:
                envoyDeployment:
                  replicas: 2
                  container:
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "256Mi"
                      limits:
                        cpu: "500m"
                        memory: "512Mi"
                envoyService:
                  type: LoadBalancer
                  annotations:
                    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
                    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
                    service.beta.kubernetes.io/aws-load-balancer-ip-address-type: dualstack
                    service.beta.kubernetes.io/aws-load-balancer-attributes: load_balancing.cross_zone.enabled=true
                  externalTrafficPolicy: Local
        # --- Gateway (HTTP:80 + HTTPS:443) ---
        - apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: eg
            namespace: envoy-gateway-system
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-gateway
          spec:
            gatewayClassName: !Sub "cnf-${EnvironmentId}-eg"
            infrastructure:
              parametersRef:
                group: gateway.envoyproxy.io
                kind: EnvoyProxy
                name: custom-proxy-config
            listeners:
              - name: http
                port: 80
                protocol: HTTP
                allowedRoutes:
                  namespaces:
                    from: All
              - name: https
                port: 443
                protocol: HTTPS
                allowedRoutes:
                  namespaces:
                    from: All
                tls:
                  mode: Terminate
                  certificateRefs:
                    - kind: Secret
                      name: eg-https-cert
        # --- StorageClass (EFS with uid/gid 1000) ---
        - apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: efs-sc
            annotations:
              storageclass.kubernetes.io/is-default-class: "true"
          provisioner: efs.csi.aws.com
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
          parameters:
            fileSystemId: !Ref EfsFileSystem
            provisioningMode: efs-ap
            directoryPerms: "0700"
            gid: "1000"
            uid: "1000"
        # --- ClusterIssuer for Let's Encrypt HTTP-01 ---
        - apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-gateway
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: !Sub "admin@${ProjectName}${EnvironmentId}.noreply.example.com"
              privateKeySecretRef:
                name: letsencrypt-gateway-account-key
              solvers:
                - http01:
                    gatewayHTTPRoute:
                      parentRefs:
                        - name: eg
                          namespace: envoy-gateway-system
                          kind: Gateway

  # ============================================================================
  # SECTION 8: CloudFront Distribution
  # ============================================================================

  # Lambda to get NLB DNS name from EKS Service
  NlbLookupFunction:
    Type: AWS::Lambda::Function
    DependsOn: QuotaCheck
    Properties:
      FunctionName: !Sub "${ProjectName}${EnvironmentId}-nlb-lookup"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 900
      MemorySize: 256
      Role: !GetAtt KubectlLambdaRole.Arn
      Code:
        ZipFile: |
          import base64,json,logging,tempfile,time,urllib3,boto3
          from botocore.signers import RequestSigner
          L=logging.getLogger();L.setLevel(logging.INFO)
          MAX_REINVOKES=4
          def get_token(sess,cluster,region):
            sts=sess.client("sts",region_name=region);si=sts.meta.service_model.service_id
            sg=RequestSigner(si,region,"sts","v4",sess.get_credentials(),sess.events)
            p={"method":"GET","url":f"https://sts.{region}.amazonaws.com/?Action=GetCallerIdentity&Version=2011-06-15","body":{},"headers":{"x-k8s-aws-id":cluster},"context":{}}
            u=sg.generate_presigned_url(p,region_name=region,expires_in=60,operation_name="")
            return "k8s-aws-v1."+base64.urlsafe_b64encode(u.encode()).decode().rstrip("=")
          def send_cfn(event,ctx,status,data=None,reason=None,pid=None):
            body=json.dumps({"Status":status,"Reason":reason or f"Logs: {ctx.log_stream_name}","PhysicalResourceId":pid or event.get("PhysicalResourceId",ctx.log_stream_name),"StackId":event["StackId"],"RequestId":event["RequestId"],"LogicalResourceId":event["LogicalResourceId"],"Data":data or {}})
            urllib3.PoolManager().request("PUT",event["ResponseURL"],body=body.encode(),headers={"Content-Type":""})
          def handler(event,ctx):
            L.info(json.dumps(event,default=str))
            rt=event["RequestType"];props=event["ResourceProperties"]
            if rt=="Delete":
              send_cfn(event,ctx,"SUCCESS",pid="nlb-lookup");return
            try:
              cn=props["ClusterName"];ns=props["Namespace"]
              svc_name=props.get("ServiceName","envoy-default-cnf")
              region=props.get("Region",boto3.session.Session().region_name)
              sess=boto3.Session(region_name=region)
              eks=sess.client("eks");ci=eks.describe_cluster(name=cn)["cluster"]
              ep=ci["endpoint"];ca=ci["certificateAuthority"]["data"]
              tf=tempfile.NamedTemporaryFile(delete=False,suffix=".crt")
              tf.write(base64.b64decode(ca));tf.flush();tf.close()
              http=urllib3.PoolManager(cert_reqs="CERT_REQUIRED",ca_certs=tf.name)
              token=get_token(sess,cn,region)
              # Poll for LoadBalancer hostname (NLB can take a few minutes)
              nlb_dns="";nlb_arn=""
              for attempt in range(360):
                if ctx.get_remaining_time_in_millis()<120000:break
                token=get_token(sess,cn,region)
                hd={"Authorization":f"Bearer {token}","Accept":"application/json"}
                # List services in envoy-gateway-system and user namespace to find the envoy service
                for search_ns in ["envoy-gateway-system",ns]:
                  r=http.request("GET",f"{ep}/api/v1/namespaces/{search_ns}/services",headers=hd)
                  if r.status==200:
                    svcs=json.loads(r.data.decode())
                    for svc in svcs.get("items",[]):
                      sn=svc.get("metadata",{}).get("name","")
                      # Match envoy gateway generated service names
                      if "envoy" in sn:
                        ingress=svc.get("status",{}).get("loadBalancer",{}).get("ingress",[])
                        if ingress:
                          nlb_dns=ingress[0].get("hostname","")
                          L.info(f"Found NLB DNS: {nlb_dns} on service {sn} in ns {search_ns}")
                          break
                  if nlb_dns:break
                if nlb_dns:break
                L.info(f"Waiting for NLB... attempt {attempt+1}")
                time.sleep(10)
              if not nlb_dns:
                # Fallback: read from props passed from K8sInfraResources
                nlb_dns=props.get("NlbDns","")
                nlb_arn=props.get("NlbArn","")
              if not nlb_dns:
                attempt=event.get("_Attempt",0)
                if attempt<MAX_REINVOKES:
                  L.info(f"NLB not found, reinvoking (attempt {attempt+1}/{MAX_REINVOKES})...")
                  event["_Attempt"]=attempt+1
                  boto3.client("lambda").invoke(FunctionName=ctx.function_name,InvocationType="Event",Payload=json.dumps(event))
                  return
                send_cfn(event,ctx,"FAILED",reason="NLB DNS not available after all retries");return
              # Get NLB ARN from ELB API using DNS name
              if not nlb_arn:
                elb=sess.client("elbv2")
                nlbs=elb.describe_load_balancers()
                for lb in nlbs.get("LoadBalancers",[]):
                  if lb.get("DNSName","")==nlb_dns:
                    nlb_arn=lb["LoadBalancerArn"];break
              send_cfn(event,ctx,"SUCCESS",data={"NlbDns":nlb_dns,"NlbArn":nlb_arn},pid="nlb-lookup")
            except Exception as e:
              L.exception("fail");send_cfn(event,ctx,"FAILED",reason=str(e)[:256])

  NlbLookup:
    Type: Custom::NlbLookup
    DependsOn: K8sInfraResources
    Properties:
      ServiceToken: !GetAtt NlbLookupFunction.Arn
      ClusterName: !Ref EksCluster
      Namespace: !Sub "cnf-${EnvironmentId}"
      Region: !Ref "AWS::Region"
      NlbDns: !GetAtt K8sInfraResources.NlbDns
      NlbArn: !GetAtt K8sInfraResources.NlbArn

  # SPA Cache Policies
  CachePolicyStaticAssets:
    Type: AWS::CloudFront::CachePolicy
    DependsOn: QuotaCheck
    Properties:
      CachePolicyConfig:
        Name: !Sub "${ProjectName}${EnvironmentId}-static-30d"
        DefaultTTL: 2592000
        MaxTTL: 2592000
        MinTTL: 2592000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  CachePolicyHtml:
    Type: AWS::CloudFront::CachePolicy
    DependsOn: QuotaCheck
    Properties:
      CachePolicyConfig:
        Name: !Sub "${ProjectName}${EnvironmentId}-html-1h"
        DefaultTTL: 3600
        MaxTTL: 3600
        MinTTL: 3600
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  ResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    DependsOn: QuotaCheck
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${ProjectName}${EnvironmentId}-security-headers"
        Comment: "Security headers + remove server"
        SecurityHeadersConfig:
          XSSProtection:
            Override: true
            Protection: true
            ModeBlock: true
          FrameOptions:
            Override: true
            FrameOption: SAMEORIGIN
          ReferrerPolicy:
            Override: true
            ReferrerPolicy: strict-origin-when-cross-origin
          ContentTypeOptions:
            Override: true
          StrictTransportSecurity:
            Override: true
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
        RemoveHeadersConfig:
          Items:
            - Header: Server
            - Header: X-Powered-By

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: NlbLookup
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectName}${EnvironmentId} - HTTP via EnvoyGateway"
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_200
        Origins:
          - Id: EnvoyGatewayNLB
            DomainName: !GetAtt NlbLookup.NlbDns
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginKeepaliveTimeout: 60
              OriginReadTimeout: 60
            OriginCustomHeaders:
              - HeaderName: X-CloudFront-Secret
                HeaderValue: !Sub "cnf-${EnvironmentId}-${AWS::AccountId}"
        DefaultCacheBehavior:
          TargetOriginId: EnvoyGatewayNLB
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
          CachedMethods: [GET, HEAD]
          CachePolicyId: !Ref CachePolicyHtml
          OriginRequestPolicyId: "216adef6-5c7f-47e4-b989-5492eafa07d3"
          ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
          Compress: true
        CacheBehaviors:
          - PathPattern: "/assets/*"
            TargetOriginId: EnvoyGatewayNLB
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            CachePolicyId: !Ref CachePolicyStaticAssets
            OriginRequestPolicyId: "bf0718e1-ba1e-49d1-88b1-f726733018ae"
            ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
            Compress: true
          - PathPattern: "/auth/*"
            TargetOriginId: EnvoyGatewayNLB
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            CachedMethods: [GET, HEAD]
            CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
            OriginRequestPolicyId: "216adef6-5c7f-47e4-b989-5492eafa07d3"
            ResponseHeadersPolicyId: !Ref ResponseHeadersPolicy
            Compress: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-cf"

  # ============================================================================
  # SECTION 9: GLOBAL ACCELERATOR
  # ============================================================================

  GlobalAccelerator:
    Type: AWS::GlobalAccelerator::Accelerator
    DependsOn: QuotaCheck
    Properties:
      Name: !Sub "${ProjectName}${EnvironmentId}"
      IpAddressType: DUAL_STACK
      Enabled: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-ga"

  GAListener443:
    Type: AWS::GlobalAccelerator::Listener
    Properties:
      AcceleratorArn: !Ref GlobalAccelerator
      Protocol: TCP
      PortRanges:
        - FromPort: 443
          ToPort: 443

  GAEndpointGroup443:
    Type: AWS::GlobalAccelerator::EndpointGroup
    Properties:
      ListenerArn: !Ref GAListener443
      EndpointGroupRegion: !Ref "AWS::Region"
      EndpointConfigurations:
        - EndpointId: !GetAtt NlbLookup.NlbArn
          ClientIPPreservationEnabled: true
          Weight: 100

  GAListener80:
    Type: AWS::GlobalAccelerator::Listener
    Properties:
      AcceleratorArn: !Ref GlobalAccelerator
      Protocol: TCP
      PortRanges:
        - FromPort: 80
          ToPort: 80

  GAEndpointGroup80:
    Type: AWS::GlobalAccelerator::EndpointGroup
    Properties:
      ListenerArn: !Ref GAListener80
      EndpointGroupRegion: !Ref "AWS::Region"
      EndpointConfigurations:
        - EndpointId: !GetAtt NlbLookup.NlbArn
          ClientIPPreservationEnabled: true
          Weight: 100

  # ============================================================================
  # SECTION 10: KUBERNETES APP RESOURCES (Test Pod + Routes + OIDC Policy)
  # ============================================================================

  EfsCsiPodIdentityAssoc:
    Type: AWS::EKS::PodIdentityAssociation
    DependsOn: AddonEfsCsi
    Properties:
      ClusterName: !Ref EksCluster
      Namespace: kube-system
      ServiceAccount: efs-csi-controller-sa
      RoleArn: !GetAtt EfsCsiRole.Arn

  # Placeholder - maintains dependency chain for GAHttpsSetup
  K8sAppResources:
    Type: Custom::K8sApp
    DependsOn:
      - K8sInfraResources
      - NlbLookup
    Properties:
      ServiceToken: !GetAtt KubectlFunction.Arn
      ClusterName: !Ref EksCluster
      Region: !Ref "AWS::Region"
      Manifests: []

  # Helm-based app deployment
  HelmDeployFunction:
    Type: AWS::Lambda::Function
    DependsOn: QuotaCheck
    Properties:
      FunctionName: !Sub "${ProjectName}${EnvironmentId}-helm-deploy"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 600
      MemorySize: 512
      Role: !GetAtt KubectlLambdaRole.Arn
      Code:
        ZipFile: |
          import base64,json,logging,os,stat,subprocess,tempfile,urllib3,boto3
          from botocore.signers import RequestSigner
          L=logging.getLogger();L.setLevel(logging.INFO)
          HELM_URL="https://get.helm.sh/helm-v3.17.3-linux-amd64.tar.gz"
          def get_token(sess,cluster,region):
            sts=sess.client("sts",region_name=region);si=sts.meta.service_model.service_id
            sg=RequestSigner(si,region,"sts","v4",sess.get_credentials(),sess.events)
            p={"method":"GET","url":f"https://sts.{region}.amazonaws.com/?Action=GetCallerIdentity&Version=2011-06-15","body":{},"headers":{"x-k8s-aws-id":cluster},"context":{}}
            u=sg.generate_presigned_url(p,region_name=region,expires_in=60,operation_name="")
            return "k8s-aws-v1."+base64.urlsafe_b64encode(u.encode()).decode().rstrip("=")
          def send_cfn(event,ctx,status,data=None,reason=None,pid=None):
            body=json.dumps({"Status":status,"Reason":reason or f"Logs: {ctx.log_stream_name}","PhysicalResourceId":pid or event.get("PhysicalResourceId",ctx.log_stream_name),"StackId":event["StackId"],"RequestId":event["RequestId"],"LogicalResourceId":event["LogicalResourceId"],"Data":data or{}})
            urllib3.PoolManager().request("PUT",event["ResponseURL"],body=body.encode(),headers={"Content-Type":""})
          def install_helm():
            helm="/tmp/helm"
            if os.path.exists(helm):return helm
            http=urllib3.PoolManager()
            r=http.request("GET",HELM_URL)
            tgz="/tmp/helm.tar.gz"
            with open(tgz,"wb") as f:f.write(r.data)
            import tarfile
            with tarfile.open(tgz,"r:gz") as t:
              m=t.getmember("linux-amd64/helm")
              m.name="helm"
              t.extract(m,"/tmp")
            os.chmod(helm,stat.S_IRWXU)
            return helm
          def handler(event,ctx):
            L.info(json.dumps(event,default=str))
            rt=event["RequestType"];props=event["ResourceProperties"]
            if rt=="Delete":
              try:
                helm=install_helm()
                cn=props["ClusterName"];ns=props["Namespace"]
                region=props.get("Region",boto3.session.Session().region_name)
                sess=boto3.Session(region_name=region)
                eks=sess.client("eks");ci=eks.describe_cluster(name=cn)["cluster"]
                ep=ci["endpoint"];ca_data=ci["certificateAuthority"]["data"]
                ca_file=tempfile.NamedTemporaryFile(delete=False,suffix=".crt")
                ca_file.write(base64.b64decode(ca_data));ca_file.flush();ca_file.close()
                token=get_token(sess,cn,region)
                kc={"apiVersion":"v1","kind":"Config","clusters":[{"cluster":{"server":ep,"certificate-authority":ca_file.name},"name":"c"}],"contexts":[{"context":{"cluster":"c","user":"u"},"name":"x"}],"current-context":"x","users":[{"name":"u","user":{"token":token}}]}
                kf=tempfile.NamedTemporaryFile(delete=False,suffix=".yaml",mode="w")
                json.dump(kc,kf);kf.flush();kf.close()
                env={**os.environ,"KUBECONFIG":kf.name}
                r=subprocess.run([helm,"uninstall",props.get("ReleaseName","cnf"),"-n",ns,"--ignore-not-found"],capture_output=True,text=True,env=env)
                L.info(f"Uninstall: {r.stdout} {r.stderr}")
              except Exception as e:
                L.warning(f"Delete cleanup: {e}")
              send_cfn(event,ctx,"SUCCESS",pid="helm-deploy");return
            try:
              cn=props["ClusterName"];ns=props["Namespace"]
              region=props.get("Region",boto3.session.Session().region_name)
              sess=boto3.Session(region_name=region)
              # Get client secret
              pool_id=props.get("UserPoolId","");client_id=props.get("ClientId","")
              secret=""
              if pool_id and client_id:
                cog=sess.client("cognito-idp")
                resp=cog.describe_user_pool_client(UserPoolId=pool_id,ClientId=client_id)
                secret=resp["UserPoolClient"].get("ClientSecret","")
              # Setup kubeconfig
              helm=install_helm()
              eks=sess.client("eks");ci=eks.describe_cluster(name=cn)["cluster"]
              ep=ci["endpoint"];ca_data=ci["certificateAuthority"]["data"]
              ca_file=tempfile.NamedTemporaryFile(delete=False,suffix=".crt")
              ca_file.write(base64.b64decode(ca_data));ca_file.flush();ca_file.close()
              token=get_token(sess,cn,region)
              kc={"apiVersion":"v1","kind":"Config","clusters":[{"cluster":{"server":ep,"certificate-authority":ca_file.name},"name":"c"}],"contexts":[{"context":{"cluster":"c","user":"u"},"name":"x"}],"current-context":"x","users":[{"name":"u","user":{"token":token}}]}
              kf=tempfile.NamedTemporaryFile(delete=False,suffix=".yaml",mode="w")
              json.dump(kc,kf);kf.flush();kf.close()
              env={**os.environ,"KUBECONFIG":kf.name,"HELM_CACHE_HOME":"/tmp/helm-cache","HELM_CONFIG_HOME":"/tmp/helm-config","HELM_DATA_HOME":"/tmp/helm-data"}
              # Build helm command
              release=props.get("ReleaseName","cnf")
              chart=props.get("ChartRef","oci://public.ecr.aws/b1y9i2f3/cnf")
              version=props.get("ChartVersion","0.1.0")
              cmd=[helm,"upgrade","--install",release,chart,"--version",version,"--namespace",ns,"--create-namespace","--wait","--timeout","10m"]
              sets=props.get("HelmSets",{})
              for k,v in sets.items():
                cmd+=["--set",f"{k}={v}"]
              # GA all IPs as Helm array
              ga_ips_key=props.get("GAIpsKey")
              if ga_ips_key:
                ips=[f"{ip}/32" for ip in props.get("GAIpv4s",[])]+[f"{ip}/128" for ip in props.get("GAIpv6s",[])]
                cmd+=["--set",f"{ga_ips_key}={{{','.join(ips)}}}"]
              # Add auth URI if cognito configured
              if pool_id and client_id and secret:
                issuer_host=f"cognito-idp.{region}.amazonaws.com/{pool_id}"
                auth_uri=f"oidc://{client_id}:{secret}@{issuer_host}?scope=openid%20profile%20email&oidc_logout=false"
                cmd+=["--set",f"scaffolding.config.auth={auth_uri}"]
              L.info(f"Running: {' '.join(cmd[:8])}...")
              r=subprocess.run(cmd,capture_output=True,text=True,env=env,timeout=540)
              L.info(f"stdout: {r.stdout}")
              if r.returncode!=0:
                L.error(f"stderr: {r.stderr}")
                send_cfn(event,ctx,"FAILED",reason=r.stderr[:256]);return
              send_cfn(event,ctx,"SUCCESS",data={"Release":release,"Namespace":ns},pid="helm-deploy")
            except Exception as e:
              L.exception("fail");send_cfn(event,ctx,"FAILED",reason=str(e)[:256])

  HelmDeploy:
    Type: Custom::HelmDeploy
    DependsOn:
      - K8sAppResources
      - GAHttpsSetup
      - CognitoOidcSetup
    Properties:
      ServiceToken: !GetAtt HelmDeployFunction.Arn
      ClusterName: !Ref EksCluster
      Region: !Ref "AWS::Region"
      Namespace: !Sub "clawbox-${EnvironmentId}"
      ReleaseName: !Sub "clawbox-${EnvironmentId}"
      ChartRef: "oci://public.ecr.aws/b1y9i2f3/clawbox"
      ChartVersion: "0.2.0"
      UserPoolId: !Ref CognitoUserPool
      ClientId: !Ref CognitoUserPoolClient
      HelmSets:
        global.gatewayNamespace: envoy-gateway-system
        global.gateway: eg
        clawbox.host.frontend: !GetAtt CloudFrontDistribution.DomainName
        clawbox.host.backend: !GetAtt GlobalAccelerator.DualStackDnsName
        clawbox.irsaRoleArn: !GetAtt PodRole.Arn

  # ============================================================================
  # SECTION 10.1: GA HTTPS RESOURCES (Certificate + Listener + Route)
  # ============================================================================

  # When GA is enabled, create Let's Encrypt cert and HTTPS listener for GA hostname
  GAHttpsSetup:
    Type: Custom::K8sApp
    DependsOn:
      - K8sAppResources
      - GlobalAccelerator
    Properties:
      ServiceToken: !GetAtt KubectlFunction.Arn
      ClusterName: !Ref EksCluster
      Region: !Ref "AWS::Region"
      Manifests:
        # --- Certificate for GA hostname ---
        - apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: ga-cert
            namespace: envoy-gateway-system
          spec:
            secretName: ga-https-cert
            issuerRef:
              name: letsencrypt-gateway
              kind: ClusterIssuer
            dnsNames:
              - !GetAtt GlobalAccelerator.DualStackDnsName
        # --- Patch Gateway to add https-ga listener ---
        - apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: eg
            namespace: envoy-gateway-system
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-gateway
          spec:
            gatewayClassName: !Sub "cnf-${EnvironmentId}-eg"
            infrastructure:
              parametersRef:
                group: gateway.envoyproxy.io
                kind: EnvoyProxy
                name: custom-proxy-config
            listeners:
              - name: http
                port: 80
                protocol: HTTP
                allowedRoutes:
                  namespaces:
                    from: All
              - name: https
                port: 443
                protocol: HTTPS
                hostname: !GetAtt NlbLookup.NlbDns
                allowedRoutes:
                  namespaces:
                    from: All
                tls:
                  mode: Terminate
                  certificateRefs:
                    - kind: Secret
                      name: eg-https-cert
              - name: https-ga
                port: 443
                protocol: HTTPS
                hostname: !GetAtt GlobalAccelerator.DualStackDnsName
                allowedRoutes:
                  namespaces:
                    from: All
                tls:
                  mode: Terminate
                  certificateRefs:
                    - kind: Secret
                      name: ga-https-cert
        # --- ClientTrafficPolicy for HTTP/2 ---
        - apiVersion: gateway.envoyproxy.io/v1alpha1
          kind: ClientTrafficPolicy
          metadata:
            name: enable-h2
            namespace: envoy-gateway-system
          spec:
            targetRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: eg
            connection:
              connectionLimit:
                value: 10000
              maxAcceptPerSocketEvent: 1
            http1:
              preserveHeaderCase: true
            http2:
              initialConnectionWindowSize: 268435456
              initialStreamWindowSize: 268435456
              maxConcurrentStreams: 1000
            timeout:
              http:
                requestReceivedTimeout: 0s

  # ============================================================================
  # SECTION 11: COGNITO OIDC - SecurityPolicy (EnvoyGateway)
  # ============================================================================

  # Lambda to update Cognito callback URLs and create JWT SecurityPolicy
  CognitoSecretFunction:
    Type: AWS::Lambda::Function
    DependsOn: QuotaCheck
    Properties:
      FunctionName: !Sub "${ProjectName}${EnvironmentId}-cognito-setup"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      MemorySize: 256
      Role: !GetAtt KubectlLambdaRole.Arn
      Code:
        ZipFile: |
          import json,logging,urllib3,boto3
          L=logging.getLogger();L.setLevel(logging.INFO)
          def send_cfn(event,ctx,status,data=None,reason=None,pid=None):
            body=json.dumps({"Status":status,"Reason":reason or f"Logs: {ctx.log_stream_name}","PhysicalResourceId":pid or event.get("PhysicalResourceId",ctx.log_stream_name),"StackId":event["StackId"],"RequestId":event["RequestId"],"LogicalResourceId":event["LogicalResourceId"],"Data":data or{}})
            urllib3.PoolManager().request("PUT",event["ResponseURL"],body=body.encode(),headers={"Content-Type":""})
          def handler(event,ctx):
            L.info(json.dumps(event,default=str))
            rt=event["RequestType"];props=event["ResourceProperties"]
            if rt=="Delete":
              send_cfn(event,ctx,"SUCCESS",pid="cognito-setup");return
            try:
              region=props.get("Region",boto3.session.Session().region_name)
              pool_id=props["UserPoolId"];client_id=props["ClientId"]
              sess=boto3.Session(region_name=region)
              cog=sess.client("cognito-idp")
              # Get client secret
              resp=cog.describe_user_pool_client(UserPoolId=pool_id,ClientId=client_id)
              secret=resp["UserPoolClient"].get("ClientSecret","")
              issuer=f"https://cognito-idp.{region}.amazonaws.com/{pool_id}"
              # Update callback URLs
              callbacks=[];logouts=[]
              cf_domain=props.get("CloudFrontDomain","")
              ga_dns=props.get("GADualStackDns","")
              if cf_domain:
                callbacks.append(f"https://{cf_domain}/auth/oidc/callback")
                logouts.append(f"https://{cf_domain}/auth/oidc/logout")
              if ga_dns:
                callbacks.append(f"https://{ga_dns}/auth/oidc/callback")
                logouts.append(f"https://{ga_dns}/auth/oidc/logout")
              if not callbacks:
                callbacks=["https://localhost/auth/oidc/callback"];logouts=["https://localhost/auth/oidc/logout"]
              L.info(f"Updating Cognito callbacks: {callbacks}")
              cog.update_user_pool_client(UserPoolId=pool_id,ClientId=client_id,
                CallbackURLs=callbacks,LogoutURLs=logouts,
                AllowedOAuthFlows=["code"],AllowedOAuthFlowsUserPoolClient=True,
                AllowedOAuthScopes=["openid","profile","email"],
                SupportedIdentityProviders=["COGNITO"],
                ExplicitAuthFlows=["ALLOW_USER_AUTH","ALLOW_USER_SRP_AUTH","ALLOW_REFRESH_TOKEN_AUTH"])
              send_cfn(event,ctx,"SUCCESS",data={"CognitoIssuer":issuer,"ClientSecret":secret},pid="cognito-setup")
            except Exception as e:
              L.exception("fail");send_cfn(event,ctx,"FAILED",reason=str(e)[:256])
            except Exception as e:
              L.exception("fail");send_cfn(event,ctx,"FAILED",reason=str(e)[:256])

  CognitoOidcSetup:
    Type: Custom::CognitoSetup
    DependsOn:
      - K8sAppResources
      - CognitoUserPoolClient
    Properties:
      ServiceToken: !GetAtt CognitoSecretFunction.Arn
      Region: !Ref "AWS::Region"
      UserPoolId: !Ref CognitoUserPool
      ClientId: !Ref CognitoUserPoolClient
      CloudFrontDomain: !GetAtt CloudFrontDistribution.DomainName
      GADualStackDns: !GetAtt GlobalAccelerator.DualStackDnsName


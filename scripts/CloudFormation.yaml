AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudNativeFormationForClawbox - One-click cloud-native infrastructure stack.
  Creates VPC(IPv6), EKS(Auto Mode), EnvoyGateway, Cognito OIDC,
  CloudFront, Global Accelerator, IRSA test pod.
  Region: ap-northeast-2 validated. Upload this single file to deploy.

# ==============================================================================
# METADATA - Console parameter grouping
# ==============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Stack Identity"
        Parameters:
          - ProjectName
          - EnvironmentId
      - Label:
          default: "Network Configuration"
        Parameters:
          - VpcCidr
      - Label:
          default: "EKS Configuration"
        Parameters:
          - EksVersion
      - Label:
          default: "EnvoyGateway"
        Parameters:
          - EnvoyGatewayVersion
      - Label:
          default: "Resource Tags"
        Parameters:
          - Tags
    ParameterLabels:
      ProjectName:
        default: "Project Name Prefix"
      EnvironmentId:
        default: "Unique Environment ID (e.g. 001)"
      VpcCidr:
        default: "VPC IPv4 CIDR"
      EksVersion:
        default: "Kubernetes Version"
      EnvoyGatewayVersion:
        default: "EnvoyGateway Version"
      Tags:
        default: "Resource Tags (JSON)"

# ==============================================================================
# PARAMETERS
# ==============================================================================
Parameters:
  ProjectName:
    Type: String
    Description: "Project name prefix for all resources (e.g. CloudNativeFormation, ProjectCNF)"
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9]{0,19}$"
    ConstraintDescription: "Must start with a letter, 1-20 alphanumeric characters"
    Default: "Clawbox"
  EnvironmentId:
    Type: String
    Description: "Unique identifier appended to all resource names (e.g. 001, dev, prod)"
    AllowedPattern: "^[a-zA-Z0-9]{1,12}$"
    ConstraintDescription: "1-12 alphanumeric characters only"
    Default: "001"
  VpcCidr:
    Type: String
    Description: "VPC IPv4 CIDR block (/16)"
    Default: "10.80.0.0/16"
    AllowedPattern: '^[0-9]+\.[0-9]+\.[0-9]+\.0\/16$'
  EksVersion:
    Type: String
    Description: "EKS Kubernetes version"
    Default: "1.35"
    AllowedValues: ["1.33", "1.34", "1.35"]
  EnvoyGatewayVersion:
    Type: String
    Description: "EnvoyGateway release version"
    Default: "v1.7.0"
  AdminRoleArn:
    Type: String
    Description: "IAM Role ARN for EKS console admin access (e.g. arn:aws:iam::123456789012:role/admin)"
    Default: ""
  Tags:
    Type: String
    Description: 'JSON object of tags to apply to all resources (e.g. {"Environment":"prod","Team":"platform"})'
    Default: "{}"
Conditions:
  HasAdminRole: !Not [!Equals [!Ref AdminRoleArn, ""]]

# ==============================================================================
# MAPPINGS
# ==============================================================================
Mappings:
  SubnetConfig:
    PublicA:
      CidrSuffix: "0.0/20"
      AZ: 0
      Ipv6Index: 0
    PublicB:
      CidrSuffix: "16.0/20"
      AZ: 1
      Ipv6Index: 1
    PublicC:
      CidrSuffix: "32.0/20"
      AZ: 2
      Ipv6Index: 2
    PrivateA:
      CidrSuffix: "128.0/20"
      AZ: 0
      Ipv6Index: 3
    PrivateB:
      CidrSuffix: "144.0/20"
      AZ: 1
      Ipv6Index: 4
    PrivateC:
      CidrSuffix: "160.0/20"
      AZ: 2
      Ipv6Index: 5

# ==============================================================================
# RESOURCES
# ==============================================================================
Resources:

  # ============================================================================
  # SECTION 0: PRE-FLIGHT QUOTA & CONFLICT CHECK
  # Runs before any infrastructure is created. Fails immediately if AWS service
  # quotas are insufficient or if a deployment with the same ProjectName +
  # EnvironmentId already exists, preventing partial or conflicting stacks.
  # Checks: EIP, VPC, NAT Gateway/AZ, m8g availability, vCPU quota, EKS/IAM/Lambda/Cognito
  # naming conflicts.
  # ============================================================================

  QuotaCheckRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QuotaCheckPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeAddresses
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeVpcs
                  - ec2:DescribeNatGateways
                  - ec2:DescribeSubnets
                  - ec2:DescribeInstanceTypeOfferings
                  - eks:DescribeCluster
                  - iam:GetRole
                  - lambda:GetFunction
                  - cognito-idp:DescribeUserPoolDomain
                  - sts:GetCallerIdentity
                  - servicequotas:GetServiceQuota
                  - elasticfilesystem:CreateMountTarget
                  - elasticfilesystem:DeleteMountTarget
                  - elasticfilesystem:DescribeMountTargets
                Resource: "*"

  QuotaCheckFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt QuotaCheckRole.Arn
      Timeout: 120
      Code:
        ZipFile: |
          import boto3, json, logging, time, urllib.request
          L=logging.getLogger();L.setLevel(logging.INFO)
          def handler(event, context):
            def send(status, data={}, reason=''):
              body = json.dumps({
                'Status': status,
                'Reason': reason or context.log_stream_name,
                'PhysicalResourceId': event.get('PhysicalResourceId', context.log_stream_name),
                'StackId': event['StackId'],
                'RequestId': event['RequestId'],
                'LogicalResourceId': event['LogicalResourceId'],
                'Data': data,
              }).encode()
              req = urllib.request.Request(
                event['ResponseURL'], data=body,
                headers={'Content-Type': '', 'Content-Length': len(body)}, method='PUT')
              urllib.request.urlopen(req)
            lid = event['LogicalResourceId']
            rt = event['RequestType']
            p = event['ResourceProperties']
            region = p.get('Region', boto3.session.Session().region_name)

            # --- EfsMountTargets handler ---
            if lid == 'EfsMountTargets':
              efs = boto3.client('efs', region_name=region)
              fsid = p['FileSystemId']
              if rt == 'Delete':
                try:
                  for mt in efs.describe_mount_targets(FileSystemId=fsid)['MountTargets']:
                    efs.delete_mount_target(MountTargetId=mt['MountTargetId'])
                  L.info("Deleted all mount targets")
                except Exception as e:
                  L.warning(f"Delete cleanup: {e}")
                return send('SUCCESS')
              # Create/Update: ensure mount targets exist for each unique-AZ subnet
              try:
                subnet_ids = p['SubnetIds']
                sg = p['SecurityGroupId']
                if isinstance(subnet_ids, str): subnet_ids = subnet_ids.split(',')
                # Deduplicate by AZ
                ec2 = boto3.client('ec2', region_name=region)
                subs = ec2.describe_subnets(SubnetIds=subnet_ids)['Subnets']
                seen_az = {}
                for s in subs:
                  az = s['AvailabilityZone']
                  if az not in seen_az: seen_az[az] = s['SubnetId']
                # Get existing mount targets
                existing = {mt['AvailabilityZoneName']: mt['MountTargetId']
                            for mt in efs.describe_mount_targets(FileSystemId=fsid)['MountTargets']}
                created = []
                for az, sid in seen_az.items():
                  if az not in existing:
                    efs.create_mount_target(FileSystemId=fsid, SubnetId=sid, SecurityGroups=[sg])
                    created.append(az)
                    L.info(f"Created mount target in {az} ({sid})")
                  else:
                    L.info(f"Mount target already exists in {az}")
                # Wait for all mount targets to become available
                for _ in range(30):
                  mts = efs.describe_mount_targets(FileSystemId=fsid)['MountTargets']
                  if all(mt['LifeCycleState'] == 'available' for mt in mts): break
                  time.sleep(5)
                send('SUCCESS', {'Count': str(len(seen_az)), 'AZs': ','.join(sorted(seen_az.keys()))})
              except Exception as e:
                L.exception("EfsMountTargets failed")
                send('FAILED', reason=str(e)[:256])
              return

            # --- QuotaCheck handler ---
            if rt == 'Delete':
              return send('SUCCESS')
            if rt == 'Update':
              try:
                _ec2 = boto3.client('ec2', region_name=region)
                azs = sorted([z['ZoneName'] for z in _ec2.describe_availability_zones(
                  Filters=[{'Name': 'state', 'Values': ['available']}])['AvailabilityZones']])
                return send('SUCCESS', {'Message': 'Update pass-through.', 'AZ1': azs[0], 'AZ2': azs[1], 'AZ3': azs[2] if len(azs) >= 3 else azs[0]})
              except Exception as e:
                return send('FAILED', reason=f"AZ detection on update: {e}")
            pn, eid = p['ProjectName'], p['EnvironmentId']
            prefix = pn + eid
            errors = []
            ec2 = boto3.client('ec2', region_name=region)
            sq = boto3.client('service-quotas', region_name=region)
            # EIP quota
            try:
              used = len(ec2.describe_addresses()['Addresses'])
              limit = int(sq.get_service_quota(ServiceCode='ec2', QuotaCode='L-0263D0A3')['Quota']['Value'])
              if limit - used < 3:
                errors.append(f"EIP: need 3 more, only {limit-used} free ({used}/{limit}). "
                              "Increase quota: Service Quotas > EC2 > EC2-VPC Elastic IPs (L-0263D0A3).")
            except Exception as e:
              errors.append(f"EIP check error: {e}")
            # VPC quota
            try:
              used = len(ec2.describe_vpcs()['Vpcs'])
              limit = int(sq.get_service_quota(ServiceCode='vpc', QuotaCode='L-F678F1CE')['Quota']['Value'])
              if limit - used < 1:
                errors.append(f"VPC: {used}/{int(limit)} used, no capacity. "
                              "Increase quota: Service Quotas > VPC > VPCs per Region (L-F678F1CE).")
            except Exception as e:
              errors.append(f"VPC check error: {e}")
            # NAT Gateway quota per AZ
            try:
              nat_limit = int(sq.get_service_quota(ServiceCode='vpc', QuotaCode='L-FE5A380F')['Quota']['Value'])
              nats, token = [], None
              while True:
                kw = {'Filter': [{'Name': 'state', 'Values': ['available', 'pending']}]}
                if token: kw['NextToken'] = token
                resp = ec2.describe_nat_gateways(**kw)
                nats.extend(resp['NatGateways'])
                token = resp.get('NextToken')
                if not token: break
              if nats:
                sids = list({n['SubnetId'] for n in nats})
                sub_az = {}
                try:
                  sub_az = {s['SubnetId']: s['AvailabilityZone']
                            for s in ec2.describe_subnets(SubnetIds=sids)['Subnets']}
                except: pass
                az_cnt = {}
                for n in nats:
                  az = sub_az.get(n['SubnetId'], n.get('SubnetId', '?'))
                  az_cnt[az] = az_cnt.get(az, 0) + 1
                for az, cnt in az_cnt.items():
                  if cnt >= nat_limit:
                    errors.append(f"NAT GW quota full in {az}: {cnt}/{int(nat_limit)}. "
                                  "Increase quota: Service Quotas > VPC > NAT gateways per AZ (L-FE5A380F).")
            except Exception as e:
              errors.append(f"NAT GW check error: {e}")
            # Instance type availability (m8g)
            try:
              avail = ec2.describe_instance_type_offerings(
                Filters=[{'Name': 'instance-type', 'Values': ['m8g.xlarge']}])['InstanceTypeOfferings']
              if not avail:
                errors.append(f"m8g.xlarge not available in {region}. NodePools using m8g won't schedule pods.")
            except Exception as e:
              errors.append(f"Instance type check error: {e}")
            # On-Demand vCPU quota (need at least 4 for initial node)
            try:
              vcpu_limit = int(sq.get_service_quota(ServiceCode='ec2', QuotaCode='L-1216C47A')['Quota']['Value'])
              if vcpu_limit < 4:
                errors.append(f"On-Demand vCPU quota too low: {vcpu_limit}. Need at least 4. "
                              "Increase quota: Service Quotas > EC2 > Running On-Demand Standard instances (L-1216C47A).")
            except Exception as e:
              errors.append(f"vCPU quota check error: {e}")
            # Verify deployer permissions via EC2 dry-run
            try:
              ec2.run_instances(DryRun=True, ImageId='ami-00000000', InstanceType='t3.micro', MinCount=1, MaxCount=1)
            except Exception as e:
              if 'DryRunOperation' in str(e): pass  # Has permission
              elif 'UnauthorizedOperation' in str(e):
                errors.append("Insufficient permissions: EC2 RunInstances denied. Deployer needs admin or PowerUser access.")
              # Other errors (invalid AMI etc) mean permission exists
            # EKS cluster name conflict
            try:
              eks = boto3.client('eks', region_name=region)
              eks.describe_cluster(name=prefix)
              errors.append(f"EKS cluster '{prefix}' already exists. Use a different EnvironmentId.")
            except eks.exceptions.ResourceNotFoundException:
              pass
            except Exception as e:
              errors.append(f"EKS conflict check error: {e}")
            # IAM role name conflicts
            iam = boto3.client('iam')
            conflicting = []
            for role in [f"{prefix}-EKSClusterRole", f"{prefix}-EKSNodeRole",
                         f"{prefix}-KubectlLambdaRole", f"{prefix}-PodRole", f"{prefix}-EfsCsiRole"]:
              try: iam.get_role(RoleName=role); conflicting.append(role)
              except iam.exceptions.NoSuchEntityException: pass
              except: pass
            if conflicting:
              errors.append(f"IAM roles already exist: {', '.join(conflicting)}. Use a different EnvironmentId.")
            # Lambda function name conflicts
            lm = boto3.client('lambda', region_name=region)
            conflicting = []
            for fn in [f"{prefix}-kubectl", f"{prefix}-cognito-setup", f"{prefix}-cognito-user-creator",
                       f"{prefix}-cognito-pre-token-gen", f"{prefix}-cognito-lambda-config",
                       f"{prefix}-eg-installer", f"{prefix}-nlb-lookup", f"{prefix}-helm-deploy"]:
              try: lm.get_function(FunctionName=fn); conflicting.append(fn)
              except lm.exceptions.ResourceNotFoundException: pass
              except: pass
            if conflicting:
              errors.append(f"Lambda functions already exist: {', '.join(conflicting)}. Use a different EnvironmentId.")
            # Cognito domain conflict
            try:
              acct = boto3.client('sts').get_caller_identity()['Account']
              domain = f"cnf-{eid}-{acct}"
              resp = boto3.client('cognito-idp', region_name=region).describe_user_pool_domain(Domain=domain)
              if resp.get('DomainDescription', {}).get('Domain'):
                errors.append(f"Cognito domain '{domain}' already exists. Use a different EnvironmentId.")
            except Exception:
              pass
            # Validate Tags parameter
            try:
              import re
              tags_raw = p.get('Tags', '{}')
              tags = json.loads(tags_raw) if isinstance(tags_raw, str) else tags_raw
              if not isinstance(tags, dict):
                errors.append("Tags must be a JSON object (e.g. {\"Key\":\"Value\"}).")
              else:
                tag_re = re.compile(r'^[\w\s_.:/=+\-@]{1,128}$')
                val_re = re.compile(r'^[\w\s_.:/=+\-@]{0,256}$')
                for k, v in tags.items():
                  if k.startswith('aws:'):
                    errors.append(f"Tag key '{k}' cannot start with 'aws:' (reserved prefix).")
                  if not tag_re.match(k):
                    errors.append(f"Tag key '{k}' invalid (1-128 chars, alphanumeric/spaces/_.:/=+-@).")
                  if not val_re.match(str(v)):
                    errors.append(f"Tag value for '{k}' invalid (0-256 chars, alphanumeric/spaces/_.:/=+-@).")
                if len(tags) > 45:
                  errors.append(f"Too many tags ({len(tags)}). Max 45 user tags (AWS reserves 5).")
            except json.JSONDecodeError as e:
              errors.append(f"Tags is not valid JSON: {e}")
            # Detect AZs
            try:
              azs = sorted([z['ZoneName'] for z in ec2.describe_availability_zones(
                Filters=[{'Name': 'state', 'Values': ['available']}])['AvailabilityZones']])
              az1, az2 = azs[0], azs[1]
              az3 = azs[2] if len(azs) >= 3 else azs[0]
            except Exception as e:
              errors.append(f"AZ detection error: {e}")
              az1 = az2 = az3 = ""
            # Result
            if errors:
              return send('FAILED', {},
                f"PRE-FLIGHT CHECK FAILED ({len(errors)} issue(s)): " + " | ".join(errors))
            send('SUCCESS', {'Message': 'All checks passed.', 'AZ1': az1, 'AZ2': az2, 'AZ3': az3})

  QuotaCheck:
    Type: Custom::QuotaCheck
    Properties:
      ServiceToken: !GetAtt QuotaCheckFunction.Arn
      ProjectName: !Ref ProjectName
      EnvironmentId: !Ref EnvironmentId
      Region: !Ref "AWS::Region"
      Tags: !Ref Tags

  # ============================================================================
  # SECTION 1: VPC + NETWORKING (IPv6 Dual-Stack)
  # ============================================================================

  VPC:
    Type: AWS::EC2::VPC
    DependsOn: QuotaCheck
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-vpc"

  IPv6CidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref VPC
      AmazonProvidedIpv6CidrBlock: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    DependsOn: QuotaCheck
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-igw"

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  EgressOnlyIGW:
    Type: AWS::EC2::EgressOnlyInternetGateway
    Properties:
      VpcId: !Ref VPC

  # --- Elastic IPs for NAT Gateways ---
  EipNatA:
    Type: AWS::EC2::EIP
    DependsOn: QuotaCheck
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-nat-eip-a"

  EipNatB:
    Type: AWS::EC2::EIP
    DependsOn: QuotaCheck
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-nat-eip-b"

  EipNatC:
    Type: AWS::EC2::EIP
    DependsOn: QuotaCheck
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-nat-eip-c"

  # --- Public Subnets ---
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !GetAtt QuotaCheck.AZ1
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 16, "12"]]
      Ipv6CidrBlock: !Select [0, !Cidr [!Select [0, !GetAtt VPC.Ipv6CidrBlocks], 8, "64"]]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-public-a"
        - Key: kubernetes.io/role/elb
          Value: "1"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !GetAtt QuotaCheck.AZ2
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 16, "12"]]
      Ipv6CidrBlock: !Select [1, !Cidr [!Select [0, !GetAtt VPC.Ipv6CidrBlocks], 8, "64"]]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-public-b"
        - Key: kubernetes.io/role/elb
          Value: "1"

  PublicSubnetC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !GetAtt QuotaCheck.AZ3
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 16, "12"]]
      Ipv6CidrBlock: !Select [2, !Cidr [!Select [0, !GetAtt VPC.Ipv6CidrBlocks], 8, "64"]]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-public-c"
        - Key: kubernetes.io/role/elb
          Value: "1"

  # --- Private Subnets (IPv6 auto-assign) ---
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !GetAtt QuotaCheck.AZ1
      CidrBlock: !Select [8, !Cidr [!Ref VpcCidr, 16, "12"]]
      Ipv6CidrBlock: !Select [3, !Cidr [!Select [0, !GetAtt VPC.Ipv6CidrBlocks], 8, "64"]]
      AssignIpv6AddressOnCreation: true
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-private-a"
        - Key: kubernetes.io/role/internal-elb
          Value: "1"

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !GetAtt QuotaCheck.AZ2
      CidrBlock: !Select [9, !Cidr [!Ref VpcCidr, 16, "12"]]
      Ipv6CidrBlock: !Select [4, !Cidr [!Select [0, !GetAtt VPC.Ipv6CidrBlocks], 8, "64"]]
      AssignIpv6AddressOnCreation: true
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-private-b"
        - Key: kubernetes.io/role/internal-elb
          Value: "1"

  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    DependsOn: IPv6CidrBlock
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !GetAtt QuotaCheck.AZ3
      CidrBlock: !Select [10, !Cidr [!Ref VpcCidr, 16, "12"]]
      Ipv6CidrBlock: !Select [5, !Cidr [!Select [0, !GetAtt VPC.Ipv6CidrBlocks], 8, "64"]]
      AssignIpv6AddressOnCreation: true
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-private-c"
        - Key: kubernetes.io/role/internal-elb
          Value: "1"

  # --- NAT Gateways (one per AZ) ---
  NatGatewayA:
    Type: AWS::EC2::NatGateway
    DependsOn: IGWAttachment
    Properties:
      AllocationId: !GetAtt EipNatA.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-nat-a"

  NatGatewayB:
    Type: AWS::EC2::NatGateway
    DependsOn: IGWAttachment
    Properties:
      AllocationId: !GetAtt EipNatB.AllocationId
      SubnetId: !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-nat-b"

  NatGatewayC:
    Type: AWS::EC2::NatGateway
    DependsOn: IGWAttachment
    Properties:
      AllocationId: !GetAtt EipNatC.AllocationId
      SubnetId: !Ref PublicSubnetC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-nat-c"

  # --- Route Tables ---
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-rtb-public"

  PublicRouteIpv4:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicRouteIpv6:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationIpv6CidrBlock: "::/0"
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetCRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetC
      RouteTableId: !Ref PublicRouteTable

  # Private Route Tables (one per AZ for independent NAT)
  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-rtb-private-a"

  PrivateRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGatewayA

  PrivateRouteA6:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationIpv6CidrBlock: "::/0"
      EgressOnlyInternetGatewayId: !Ref EgressOnlyIGW

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-rtb-private-b"

  PrivateRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGatewayB

  PrivateRouteB6:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationIpv6CidrBlock: "::/0"
      EgressOnlyInternetGatewayId: !Ref EgressOnlyIGW

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

  PrivateRouteTableC:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-rtb-private-c"

  PrivateRouteC:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableC
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGatewayC

  PrivateRouteC6:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableC
      DestinationIpv6CidrBlock: "::/0"
      EgressOnlyInternetGatewayId: !Ref EgressOnlyIGW

  PrivateSubnetCRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetC
      RouteTableId: !Ref PrivateRouteTableC

  # --- S3 Gateway Endpoint ---
  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTableA
        - !Ref PrivateRouteTableB
        - !Ref PrivateRouteTableC

  # ============================================================================
  # SECTION 2: IAM ROLES
  # ============================================================================

  # --- EKS Cluster Role ---
  EksClusterRole:
    Type: AWS::IAM::Role
    DependsOn: QuotaCheck
    Properties:
      RoleName: !Sub "${ProjectName}${EnvironmentId}-EKSClusterRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action:
              - "sts:AssumeRole"
              - "sts:TagSession"   # Required for eks.7+ to use cluster role for Karpenter compute ops
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSComputePolicy
        - arn:aws:iam::aws:policy/AmazonEKSBlockStoragePolicy
        - arn:aws:iam::aws:policy/AmazonEKSLoadBalancingPolicy
        - arn:aws:iam::aws:policy/AmazonEKSNetworkingPolicy
      Policies:
        - PolicyName: AllowCustomNodeClassTags
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateLaunchTemplate
                  - ec2:CreateFleet
                  - ec2:RunInstances
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:RequestTag/eks:eks-cluster-name": "${aws:PrincipalTag/eks:eks-cluster-name}"
                  StringLike:
                    "aws:RequestTag/eks:kubernetes-node-class-name": "*"
                    "aws:RequestTag/eks:kubernetes-node-pool-name": "*"

  # --- EKS Node Role ---
  EksNodeRole:
    Type: AWS::IAM::Role
    DependsOn: QuotaCheck
    Properties:
      RoleName: !Sub "${ProjectName}${EnvironmentId}-EKSNodeRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodeMinimalPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPullOnly

  # --- Lambda Execution Role (for K8s resource management) ---
  KubectlLambdaRole:
    Type: AWS::IAM::Role
    DependsOn: QuotaCheck
    Properties:
      RoleName: !Sub "${ProjectName}${EnvironmentId}-KubectlLambdaRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: EksAndSts
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                  - eks:ListClusters
                  - eks:ListAddons
                  - eks:DescribeAddon
                Resource: "*"
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                Resource: "*"
              - Effect: Allow
                Action:
                  - cognito-idp:DescribeUserPool
                  - cognito-idp:DescribeUserPoolClient
                  - cognito-idp:UpdateUserPoolClient
                  - cognito-idp:UpdateUserPool
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminAddUserToGroup
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}${EnvironmentId}-*"
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStackEvents
                Resource: "*"

  # --- Test Pod IRSA Role (via Pod Identity) ---
  PodRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}${EnvironmentId}-PodRole"
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [
                {"Effect":"Allow","Principal":{"Service":"pods.eks.amazonaws.com"},"Action":["sts:AssumeRole","sts:TagSession"]},
                {"Effect":"Allow","Principal":{"Federated":"${OidcArn}"},"Action":"sts:AssumeRoleWithWebIdentity","Condition":{"StringEquals":{"${OidcHost}:aud":"sts.amazonaws.com"}}}
              ]
            }
          - OidcArn: !GetAtt EksOidcProvider.Arn
            OidcHost: !Select [1, !Split ["https://", !GetAtt EksCluster.OpenIdConnectIssuerUrl]]
      Policies:
        - PolicyName: CNFPodReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: STSCallerIdentity
                Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: "*"
              - Sid: IAMRoleRead
                Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${ProjectName}${EnvironmentId}-PodRole"

  EfsCsiRole:
    Type: AWS::IAM::Role
    DependsOn: QuotaCheck
    Properties:
      RoleName: !Sub "${ProjectName}${EnvironmentId}-EfsCsiRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - "sts:AssumeRole"
              - "sts:TagSession"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEFSCSIDriverPolicy

  # ============================================================================
  # SECTION 3: EKS CLUSTER
  # ============================================================================

  EksCluster:
    Type: AWS::EKS::Cluster
    DependsOn:
      - PrivateSubnetARouteAssoc
      - PrivateSubnetBRouteAssoc
      - PrivateSubnetCRouteAssoc
      - PublicSubnetARouteAssoc
      - PublicSubnetBRouteAssoc
      - PublicSubnetCRouteAssoc
      - NatGatewayA
      - NatGatewayB
      - NatGatewayC
      - S3Endpoint
    Properties:
      Name: !Sub "${ProjectName}${EnvironmentId}"
      Version: !Ref EksVersion
      RoleArn: !GetAtt EksClusterRole.Arn
      AccessConfig:
        AuthenticationMode: API
      BootstrapSelfManagedAddons: false
      ComputeConfig:
        Enabled: true
        NodePools:
          - system
        NodeRoleArn: !GetAtt EksNodeRole.Arn
      StorageConfig:
        BlockStorage:
          Enabled: true
      KubernetesNetworkConfig:
        IpFamily: ipv6
        ElasticLoadBalancing:
          Enabled: true
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PrivateSubnetA
          - !Ref PrivateSubnetB
          - !Ref PrivateSubnetC
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
        PublicAccessCidrs:
          - "0.0.0.0/0"
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}"

  # --- EKS Access Entry for Lambda (cluster admin) ---
  LambdaAccessEntry:
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Ref EksCluster
      PrincipalArn: !GetAtt KubectlLambdaRole.Arn
      Type: STANDARD
      AccessPolicies:
        - AccessScope:
            Type: cluster
          PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy

  # NodeAccessEntry is auto-created by EKS when NodeRoleArn is set in ComputeConfig.
  # We do NOT create it explicitly — doing so would conflict with the auto-created entry.

  AdminAccessEntry:
    Type: AWS::EKS::AccessEntry
    Condition: HasAdminRole
    Properties:
      ClusterName: !Ref EksCluster
      PrincipalArn: !Ref AdminRoleArn
      Type: STANDARD
      AccessPolicies:
        - AccessScope:
            Type: cluster
          PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy

  # --- Allow Lambda SG to reach EKS cluster private API endpoint (TCP 443) ---
  ClusterSGIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt EksCluster.ClusterSecurityGroupId
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref KubectlLambdaSG
      Description: "Allow Lambda to reach EKS API private endpoint"

  # ============================================================================
  # SECTION 3.5: EFS FILE SYSTEM
  # ============================================================================

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    DependsOn: QuotaCheck
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-efs"

  EfsMountTargets:
    Type: Custom::EfsMountTargets
    Properties:
      ServiceToken: !GetAtt QuotaCheckFunction.Arn
      FileSystemId: !Ref EfsFileSystem
      Region: !Ref "AWS::Region"
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
        - !Ref PrivateSubnetC
      SecurityGroupId: !GetAtt EksCluster.ClusterSecurityGroupId

  # ============================================================================
  # SECTION 4: EKS ADDONS
  # ============================================================================

  # Custom Resource: Apply NodePools before addons so custom pools schedule system pods
  K8sNodePools:
    Type: Custom::K8sNodePools
    DependsOn:
      - LambdaAccessEntry
      - ClusterSGIngressFromLambda
    Properties:
      ServiceToken: !GetAtt KubectlFunction.Arn
      ClusterName: !Ref EksCluster
      Region: !Ref "AWS::Region"
      PostApplySleep: "60"
      NodeClassTags: !Ref Tags
      Manifests:
        # --- Custom NodePool: cpu-system (replaces built-in system for m8g.xlarge) ---
        - apiVersion: karpenter.sh/v1
          kind: NodePool
          metadata:
            name: cpu-system
            labels:
              app.kubernetes.io/managed-by: eks
            annotations:
              karpenter.sh/nodepool-hash-version: v3
          spec:
            disruption:
              budgets:
                - nodes: 10%
              consolidateAfter: 15m
              consolidationPolicy: WhenEmpty
            template:
              metadata:
                labels:
                  usage: system
              spec:
                expireAfter: 480h
                nodeClassRef:
                  group: eks.amazonaws.com
                  kind: NodeClass
                  name: default-tags
                requirements:
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values:
                      - on-demand
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - m8g.xlarge
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
                taints:
                  - effect: NoSchedule
                    key: CriticalAddonsOnly
                terminationGracePeriod: 24h0m0s
        # --- Custom NodePool: cpu (arm64 m8g general workloads) ---
        - apiVersion: karpenter.sh/v1
          kind: NodePool
          metadata:
            name: cpu
            labels:
              app.kubernetes.io/managed-by: eks
            annotations:
              karpenter.sh/nodepool-hash-version: v3
          spec:
            disruption:
              budgets:
                - nodes: 10%
              consolidateAfter: 15m
              consolidationPolicy: WhenEmpty
            limits:
              cpu: "1000"
              memory: 1000Gi
            template:
              metadata:
                labels:
                  type: cpu
              spec:
                expireAfter: 480h
                nodeClassRef:
                  group: eks.amazonaws.com
                  kind: NodeClass
                  name: default-tags
                requirements:
                  - key: eks.amazonaws.com/instance-family
                    operator: In
                    values:
                      - m8g
                  - key: eks.amazonaws.com/instance-cpu
                    operator: In
                    values:
                      - "2"
                      - "4"
                      - "8"
                      - "16"
                      - "32"
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values:
                      - on-demand
        # --- Custom NodePool: cpu-large (arm64 m8g large with taint) ---
        - apiVersion: karpenter.sh/v1
          kind: NodePool
          metadata:
            name: cpu-large
            labels:
              app.kubernetes.io/managed-by: eks
            annotations:
              karpenter.sh/nodepool-hash-version: v3
          spec:
            disruption:
              budgets:
                - nodes: 10%
              consolidateAfter: 15m
              consolidationPolicy: WhenEmpty
            limits:
              cpu: "1000"
              memory: 1000Gi
            template:
              metadata:
                labels:
                  type: cpu-large
              spec:
                expireAfter: 480h
                nodeClassRef:
                  group: eks.amazonaws.com
                  kind: NodeClass
                  name: default-tags
                requirements:
                  - key: eks.amazonaws.com/instance-family
                    operator: In
                    values:
                      - m8g
                  - key: eks.amazonaws.com/instance-cpu
                    operator: In
                    values:
                      - "8"
                      - "16"
                      - "32"
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values:
                      - on-demand
                taints:
                  - effect: NoSchedule
                    key: size
                    value: "large"
        # --- Custom NodePool: gpu (nvidia g6e.2xlarge) ---
        - apiVersion: karpenter.sh/v1
          kind: NodePool
          metadata:
            name: gpu
            labels:
              app.kubernetes.io/managed-by: eks
            annotations:
              karpenter.sh/nodepool-hash-version: v3
          spec:
            disruption:
              budgets:
                - nodes: 10%
              consolidateAfter: 15m
              consolidationPolicy: WhenEmpty
            limits:
              cpu: "1000"
              memory: 1000Gi
              nvidia.com/gpu: 32
            template:
              metadata:
                labels:
                  type: gpu
              spec:
                expireAfter: 470h
                nodeClassRef:
                  group: eks.amazonaws.com
                  kind: NodeClass
                  name: default-tags
                requirements:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - g6e.2xlarge
                  - key: eks.amazonaws.com/instance-gpu-manufacturer
                    operator: In
                    values:
                      - nvidia
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values:
                      - on-demand
                taints:
                  - effect: NoSchedule
                    key: nvidia.com/gpu
                    value: "true"
        # --- Custom NodePool: cpu-general (x86 c8a/c8i with taint) ---
        - apiVersion: karpenter.sh/v1
          kind: NodePool
          metadata:
            name: cpu-general
            labels:
              app.kubernetes.io/managed-by: eks
            annotations:
              karpenter.sh/nodepool-hash-version: v3
          spec:
            disruption:
              budgets:
                - nodes: 10%
              consolidateAfter: 15m
              consolidationPolicy: WhenEmpty
            limits:
              cpu: "128"
              memory: 256Gi
            template:
              metadata:
                labels:
                  type: cpu-x86
              spec:
                expireAfter: 472h
                nodeClassRef:
                  group: eks.amazonaws.com
                  kind: NodeClass
                  name: default-tags
                requirements:
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values:
                      - on-demand
                  - key: eks.amazonaws.com/instance-family
                    operator: In
                    values:
                      - c8a
                      - c8i
                      - c8i-flex
                      - c7a
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                taints:
                  - effect: NoSchedule
                    key: arch
                    value: x86_64
                terminationGracePeriod: 24h0m0s

  AddonVpcCni:
    Type: AWS::EKS::Addon
    DependsOn:
      - LambdaAccessEntry
      - K8sNodePools
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: vpc-cni
      ResolveConflicts: OVERWRITE
      ConfigurationValues: !Sub |
        {
          "env": {
            "ENABLE_V6_EGRESS": "true",
            "ENABLE_PREFIX_DELEGATION": "true",
            "WARM_PREFIX_TARGET": "1",
            "WARM_IP_TARGET": "0",
            "MINIMUM_IP_TARGET": "0"
          },
          "init": {
            "env": {
              "ENABLE_V6_EGRESS": "true",
              "DISABLE_TCP_EARLY_DEMUX": "true"
            }
          }
        }

  AddonCoreDns:
    Type: AWS::EKS::Addon
    DependsOn: AddonVpcCni
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: coredns
      ResolveConflicts: OVERWRITE

  AddonKubeProxy:
    Type: AWS::EKS::Addon
    DependsOn: AddonVpcCni
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: kube-proxy
      ResolveConflicts: OVERWRITE

  AddonPodIdentity:
    Type: AWS::EKS::Addon
    DependsOn: AddonVpcCni
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: eks-pod-identity-agent
      ResolveConflicts: OVERWRITE

  AddonMetricsServer:
    Type: AWS::EKS::Addon
    DependsOn: AddonCoreDns
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: metrics-server
      ResolveConflicts: OVERWRITE

  AddonEfsCsi:
    Type: AWS::EKS::Addon
    DependsOn: AddonVpcCni
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: aws-efs-csi-driver
      ResolveConflicts: OVERWRITE

  AddonS3Csi:
    Type: AWS::EKS::Addon
    DependsOn: AddonVpcCni
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: aws-mountpoint-s3-csi-driver
      ResolveConflicts: OVERWRITE

  AddonCertManager:
    Type: AWS::EKS::Addon
    DependsOn: AddonVpcCni
    Properties:
      ClusterName: !Ref EksCluster
      AddonName: cert-manager
      ResolveConflicts: OVERWRITE
      ConfigurationValues: |
        {
          "extraArgs": ["--enable-gateway-api=true"]
        }

  # --- IAM OIDC Provider for IRSA ---
  EksOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !GetAtt EksCluster.OpenIdConnectIssuerUrl
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - "06b25927c42a721631c1efd9431e648fa62e1e39"

  # ============================================================================
  # SECTION 5: KUBECTL LAMBDA FUNCTION (inline boto3/urllib3)
  # ============================================================================

  KubectlLambdaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ProjectName}${EnvironmentId} kubectl lambda SG"
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
        - IpProtocol: "-1"
          CidrIpv6: "::/0"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}${EnvironmentId}-kubectl-lambda-sg"

  KubectlFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - LambdaAccessEntry
      - ClusterSGIngressFromLambda
    Properties:
      FunctionName: !Sub "${ProjectName}${EnvironmentId}-kubectl"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 900
      MemorySize: 512
      Role: !GetAtt KubectlLambdaRole.Arn
      Environment:
        Variables:
          CLUSTER_NAME: !Ref EksCluster
          REGION: !Ref "AWS::Region"
      Code:
        ZipFile: |
          import base64,json,logging,tempfile,time,urllib3,boto3
          from botocore.signers import RequestSigner
          L=logging.getLogger();L.setLevel(logging.INFO)
          _CTX=None
          def has_time(margin=60):
            return _CTX is None or _CTX.get_remaining_time_in_millis()>margin*1000
          CORE={"Namespace":("api/v1","namespaces",0),"Service":("api/v1","services",1),"ConfigMap":("api/v1","configmaps",1),"Secret":("api/v1","secrets",1),"ServiceAccount":("api/v1","serviceaccounts",1),"Pod":("api/v1","pods",1)}
          GRP={"Deployment":("apis/apps/v1","deployments",1),"DaemonSet":("apis/apps/v1","daemonsets",1),"ClusterRole":("apis/rbac.authorization.k8s.io/v1","clusterroles",0),"ClusterRoleBinding":("apis/rbac.authorization.k8s.io/v1","clusterrolebindings",0),"Role":("apis/rbac.authorization.k8s.io/v1","roles",1),"RoleBinding":("apis/rbac.authorization.k8s.io/v1","rolebindings",1),"CustomResourceDefinition":("apis/apiextensions.k8s.io/v1","customresourcedefinitions",0),"StorageClass":("apis/storage.k8s.io/v1","storageclasses",0),"PersistentVolume":("api/v1","persistentvolumes",0),"PersistentVolumeClaim":("api/v1","persistentvolumeclaims",1),"ClusterIssuer":("apis/cert-manager.io/v1","clusterissuers",0),"Certificate":("apis/cert-manager.io/v1","certificates",1)}
          PLURALS={"GatewayClass":"gatewayclasses","Gateway":"gateways","HTTPRoute":"httproutes","TCPRoute":"tcproutes","TLSRoute":"tlsroutes","GRPCRoute":"grpcroutes","EnvoyProxy":"envoyproxies","SecurityPolicy":"securitypolicies","BackendTrafficPolicy":"backendtrafficpolicies","ClientTrafficPolicy":"clienttrafficpolicies","EnvoyExtensionPolicy":"envoyextensionpolicies","BackendLBPolicy":"backendlbpolicies","ReferenceGrant":"referencegrants","NodePool":"nodepools","NodeClass":"nodeclasses"}
          INT_FIELDS={"port","replicas","containerPort","hostPort","targetPort","terminationGracePeriodSeconds","timeoutSeconds","initialDelaySeconds","periodSeconds","successThreshold","failureThreshold","weight","minReadySeconds","minReplicas","maxReplicas","revisionHistoryLimit","progressDeadlineSeconds","iops","throughput","runAsUser","runAsGroup","fsGroup","runAsNonRoot","value","maxConcurrentStreams","maxAcceptPerSocketEvent","initialStreamWindowSize","initialConnectionWindowSize"}
          BOOL_FIELDS={"preserveHeaderCase","enabled","readOnly","optional","hostNetwork","shareProcessNamespace"}
          def coerce_ints(obj,key=None):
            if isinstance(obj,dict):return{k:coerce_ints(v,k) for k,v in obj.items()}
            if isinstance(obj,list):return[coerce_ints(i,key) for i in obj]
            if isinstance(obj,str) and key in INT_FIELDS and obj.lstrip('-').isdigit():
              try:return int(obj)
              except:pass
            if isinstance(obj,str) and key in BOOL_FIELDS and obj.lower() in("true","false"):
              return obj.lower()=="true"
            return obj
          def get_token(session,cluster,region):
            sts=session.client("sts",region_name=region)
            si=sts.meta.service_model.service_id
            sg=RequestSigner(si,region,"sts","v4",session.get_credentials(),session.events)
            p={"method":"GET","url":f"https://sts.{region}.amazonaws.com/?Action=GetCallerIdentity&Version=2011-06-15","body":{},"headers":{"x-k8s-aws-id":cluster},"context":{}}
            u=sg.generate_presigned_url(p,region_name=region,expires_in=60,operation_name="")
            return "k8s-aws-v1."+base64.urlsafe_b64encode(u.encode()).decode().rstrip("=")
          def rpath(av,kind,ns):
            for t in[CORE,GRP]:
              if kind in t:
                px,pl,nsd=t[kind]
                return f"/{px}/namespaces/{ns}/{pl}" if nsd and ns else f"/{px}/{pl}"
            pl=PLURALS.get(kind,kind.lower()+"s")
            px=f"apis/{av}" if "/" in av else f"api/{av}"
            return f"/{px}/namespaces/{ns}/{pl}" if ns else f"/{px}/{pl}"
          def k8s_apply(http,ep,token,m,retries=40):
            av=m.get("apiVersion","");kind=m.get("kind","");md=m.get("metadata",{})
            name=md.get("name","");ns=md.get("namespace")
            p=rpath(av,kind,ns)
            hd={"Authorization":f"Bearer {token}","Content-Type":"application/json","Accept":"application/json"}
            b=json.dumps(m).encode()
            last_status=0;last_body={};last_attempt=0
            for attempt in range(retries):
              if not has_time(120):break
              r=http.request("POST",f"{ep}{p}",headers=hd,body=b)
              if r.status==409:
                hd["Content-Type"]="application/merge-patch+json"
                r=http.request("PATCH",f"{ep}{p}/{name}",headers=hd,body=b)
                return "updated",r.status,json.loads(r.data.decode()) if r.data else {}
              if 200<=r.status<300:
                if attempt>0:L.info(f"{kind}/{name} succeeded after {attempt+1} attempts")
                return "created",r.status,json.loads(r.data.decode()) if r.data else {}
              last_status=r.status;last_attempt=attempt+1
              try:last_body=json.loads(r.data.decode()) if r.data else {}
              except:last_body={"raw":r.data.decode()[:500] if r.data else ""}
              if attempt==0:L.warning(f"{r.status} body: {str(last_body)[:500]}")
              wait=min(30,5*(attempt+1))
              L.warning(f"{r.status} on {kind}/{name}, retry {attempt+1}/{retries} in {wait}s")
              time.sleep(wait)
            msg=last_body.get("message",str(last_body)[:200]) if isinstance(last_body,dict) else str(last_body)[:200]
            return "error",last_status,{"retries":last_attempt,"message":msg}
          def k8s_delete(http,ep,token,m):
            av=m.get("apiVersion","");kind=m.get("kind","");md=m.get("metadata",{})
            name=md.get("name","");ns=md.get("namespace")
            p=rpath(av,kind,ns)
            hd={"Authorization":f"Bearer {token}","Accept":"application/json"}
            r=http.request("DELETE",f"{ep}{p}/{name}",headers=hd)
            return("deleted" if 200<=r.status<300 or r.status==404 else "error"),r.status
          def k8s_get(http,ep,token,av,kind,name,ns=None):
            p=rpath(av,kind,ns)
            hd={"Authorization":f"Bearer {token}","Accept":"application/json"}
            r=http.request("GET",f"{ep}{p}/{name}",headers=hd)
            return r.status,json.loads(r.data.decode()) if r.data else {}
          def send_cfn(event,ctx,status,data=None,reason=None,pid=None):
            body=json.dumps({"Status":status,"Reason":reason or f"See logs: {ctx.log_stream_name}","PhysicalResourceId":pid or event.get("PhysicalResourceId",ctx.log_stream_name),"StackId":event["StackId"],"RequestId":event["RequestId"],"LogicalResourceId":event["LogicalResourceId"],"Data":data or {}})
            urllib3.PoolManager().request("PUT",event["ResponseURL"],body=body.encode(),headers={"Content-Type":""})
          MAX_REINVOKES=4  # 4 reinvokes × 15min = 75min total
          def reinvoke_or_fail(event,ctx,reason):
            attempt=event.get("_Attempt",0)
            if attempt<MAX_REINVOKES:
              L.info(f"Timeout approaching, reinvoking (attempt {attempt+1}/{MAX_REINVOKES})...")
              event["_Attempt"]=attempt+1
              boto3.client("lambda").invoke(FunctionName=ctx.function_name,InvocationType="Event",Payload=json.dumps(event))
            else:
              L.error(f"Max reinvokes reached: {reason}")
              send_cfn(event,ctx,"FAILED",reason=reason)
          def handler(event,ctx):
            global _CTX;_CTX=ctx
            L.info(json.dumps(event,default=str))
            rt=event["RequestType"];props=event["ResourceProperties"]
            # For Delete: clean up K8s resources and wait for NLB removal before signaling SUCCESS
            if rt=="Delete":
              try:
                cn=props["ClusterName"];region=props.get("Region",boto3.session.Session().region_name)
                sess=boto3.Session(region_name=region)
                eks=sess.client("eks");ci=eks.describe_cluster(name=cn)["cluster"]
                ep=ci["endpoint"];ca=ci["certificateAuthority"]["data"]
                tf=tempfile.NamedTemporaryFile(delete=False,suffix=".crt")
                tf.write(base64.b64decode(ca));tf.flush();tf.close()
                http=urllib3.PoolManager(cert_reqs="CERT_REQUIRED",ca_certs=tf.name,timeout=urllib3.Timeout(connect=10,read=10))
                token=get_token(sess,cn,region)
                manifests=props.get("Manifests",[])
                if isinstance(manifests,str):manifests=json.loads(manifests)
                for m in reversed(manifests):
                  a,s=k8s_delete(http,ep,token,m)
                  lbl=f"{m.get('kind')}/{m.get('metadata',{}).get('name')}"
                  L.info(f"{a} {lbl} HTTP {s}")
                # Wait for NLB to be fully deprovisioned (Gateway deletion triggers async NLB removal)
                ns_val=props.get("Namespace","")
                for wait_att in range(60):
                  if ctx.get_remaining_time_in_millis()<30000:break
                  token=get_token(sess,cn,region)
                  hd_base={"Authorization":f"Bearer {token}","Accept":"application/json"}
                  found_lb=False
                  for search_ns in ["envoy-gateway-system",ns_val]:
                    if not search_ns:continue
                    r=http.request("GET",f"{ep}/api/v1/namespaces/{search_ns}/services",headers=hd_base)
                    if r.status==200:
                      svcs=json.loads(r.data.decode())
                      for svc in svcs.get("items",[]):
                        if svc.get("spec",{}).get("type")=="LoadBalancer":
                          found_lb=True;break
                    if found_lb:break
                  if not found_lb:L.info("No LoadBalancer services remaining");break
                  L.info(f"Waiting for LB services to be removed, attempt {wait_att+1}");time.sleep(10)
              except Exception as de:
                L.warning(f"Delete cleanup (non-fatal): {de}")
              send_cfn(event,ctx,"SUCCESS",pid=event.get("PhysicalResourceId",ctx.log_stream_name))
              return
            try:
              cn=props["ClusterName"];region=props.get("Region",boto3.session.Session().region_name)
              sess=boto3.Session(region_name=region)
              eks=sess.client("eks");ci=eks.describe_cluster(name=cn)["cluster"]
              ep=ci["endpoint"];ca=ci["certificateAuthority"]["data"]
              tf=tempfile.NamedTemporaryFile(delete=False,suffix=".crt")
              tf.write(base64.b64decode(ca));tf.flush();tf.close()
              http=urllib3.PoolManager(cert_reqs="CERT_REQUIRED",ca_certs=tf.name)
              token=get_token(sess,cn,region)
              # --- Verify all EKS addons are ACTIVE before proceeding ---
              if rt=="Create":
                L.info("Checking EKS addon health...")
                try:
                  addon_names=eks.list_addons(clusterName=cn).get("addons",[])
                  core_addons={"vpc-cni","coredns","kube-proxy","eks-pod-identity-agent"}
                  addon_names=[a for a in addon_names if a in core_addons]
                  L.info(f"Addons: {addon_names}")
                  for addon_att in range(360):
                    if not has_time(300):break  # Leave 5min for manifest apply
                    unhealthy=[]
                    for addon in addon_names:
                      try:
                        ad=eks.describe_addon(clusterName=cn,addonName=addon)["addon"]
                        st=ad.get("status","")
                        if st!="ACTIVE":
                          issues=[i.get("message","") for i in ad.get("health",{}).get("issues",[])]
                          L.warning(f"Addon {addon}: {st} issues={issues}")
                          unhealthy.append(f"{addon}:{st}")
                      except Exception as ae:L.warning(f"describe_addon {addon}: {ae}")
                    if not unhealthy:
                      L.info("All addons ACTIVE");break
                    L.info(f"Unhealthy addons: {unhealthy}, attempt {addon_att+1}");time.sleep(10)
                  if unhealthy:L.warning(f"Proceeding with unhealthy addons: {unhealthy}")
                except Exception as ae2:L.warning(f"Addon health check failed (non-fatal): {ae2}")
              # --- Restart deployments to pick up Pod Identity credentials ---
              restart_list=props.get("RestartDeployments","")
              if restart_list and rt=="Create":
                token=get_token(sess,cn,region)
                hd_p={"Authorization":f"Bearer {token}","Content-Type":"application/strategic-merge-patch+json","Accept":"application/json"}
                for item in restart_list.split(","):
                  rns,rname=item.strip().split("/",1)
                  patch=json.dumps({"spec":{"template":{"metadata":{"annotations":{"kubectl.kubernetes.io/restartedAt":time.strftime("%Y-%m-%dT%H:%M:%SZ",time.gmtime())}}}}}).encode()
                  r=http.request("PATCH",f"{ep}/apis/apps/v1/namespaces/{rns}/deployments/{rname}",headers=hd_p,body=patch)
                  L.info(f"Restart {item}: HTTP {r.status}")
              manifests=props.get("Manifests",[])
              if isinstance(manifests,str):manifests=json.loads(manifests)
              manifests=coerce_ints(manifests)
              # --- Create default-tags NodeClass from default + user tags ---
              nc_tags_raw=props.get("NodeClassTags","")
              if nc_tags_raw and rt in("Create","Update"):
                try:
                  nc_tags=json.loads(nc_tags_raw) if isinstance(nc_tags_raw,str) else nc_tags_raw
                  if not isinstance(nc_tags,dict):nc_tags={}
                  token=get_token(sess,cn,region)
                  # Wait for default NodeClass to exist and be Ready
                  for nca in range(300):
                    if not has_time(120):break
                    nc_s,nc_d=k8s_get(http,ep,token,"eks.amazonaws.com/v1","NodeClass","default")
                    if nc_s==200:
                      nc_conds={c["type"]:c["status"] for c in nc_d.get("status",{}).get("conditions",[])}
                      if nc_conds.get("Ready")=="True":break
                    L.info(f"Waiting for default NodeClass Ready, attempt {nca+1}");time.sleep(1)
                  if nc_s==200:
                    nc_new={"apiVersion":"eks.amazonaws.com/v1","kind":"NodeClass","metadata":{"name":"default-tags"},"spec":nc_d.get("spec",{})}
                    if nc_tags:nc_new["spec"]["tags"]=nc_tags
                    a,s,d=k8s_apply(http,ep,token,nc_new)
                    L.info(f"NodeClass/default-tags: {a} HTTP {s}")
                    # Wait for default-tags to become Ready
                    for ncr in range(300):
                      if not has_time(120):break
                      nct_s,nct_d=k8s_get(http,ep,token,"eks.amazonaws.com/v1","NodeClass","default-tags")
                      if nct_s==200:
                        nct_conds={c["type"]:c["status"] for c in nct_d.get("status",{}).get("conditions",[])}
                        if nct_conds.get("Ready")=="True":L.info("NodeClass/default-tags is Ready!");break
                      L.info(f"Waiting for default-tags Ready, attempt {ncr+1}");time.sleep(1)
                  else:
                    L.warning(f"default NodeClass not found (HTTP {nc_s}), skipping default-tags creation")
                except Exception as nce:
                  L.warning(f"NodeClass setup error: {nce}")
              results=[]
              if rt in("Create","Update"):
                # Refresh token (may have expired during addon wait)
                token=get_token(sess,cn,region)
                for m in manifests:
                  a,s,d=k8s_apply(http,ep,token,m)
                  lbl=f"{m.get('kind')}/{m.get('metadata',{}).get('name')}"
                  L.info(f"{a} {lbl} HTTP {s}")
                  results.append({"r":lbl,"a":a,"s":s,"d":d} if a=="error" else {"r":lbl,"a":a,"s":s})
                  if a=="error":L.error(f"Error on {lbl}: {json.dumps(d)}")
              errs=[r for r in results if r["a"]=="error"]
              if errs:
                e0=errs[0];msg=f"{e0['r']} HTTP {e0['s']} retries={e0.get('d',{}).get('retries','?')}: {e0.get('d',{}).get('message','unknown')}"
                if len(errs)>1:msg+=f" (+{len(errs)-1} more)"
                send_cfn(event,ctx,"FAILED",reason=msg[:256]);return
              # Optional post-apply sleep (e.g. wait for NodePools to register)
              sleep_secs=int(props.get("PostApplySleep","0"))
              if sleep_secs>0:
                L.info(f"PostApplySleep: waiting {sleep_secs}s");time.sleep(sleep_secs)
              # Built-in system NodePool kept - Karpenter controller depends on it for scheduling
              env_id=props.get("EnvironmentId",cn.split("-")[-1] if "-" in cn else "001")
              ns_val=props.get("Namespace",f"cnf-{env_id}")
              hd_base={"Authorization":f"Bearer {token}","Accept":"application/json"}
              nlb_dns="";nlb_arn=""
              if rt=="Create" and not props.get("PostApplySleep"):
                # --- Wait for at least 1 Ready node ---
                L.info("Waiting for at least 1 Ready node...")
                node_ready=False
                for nd_att in range(360):
                  if not has_time(120):break
                  token=get_token(sess,cn,region)
                  hd_base={"Authorization":f"Bearer {token}","Accept":"application/json"}
                  r_nodes=http.request("GET",f"{ep}/api/v1/nodes",headers=hd_base)
                  if r_nodes.status==200:
                    nd=json.loads(r_nodes.data.decode())
                    for node in nd.get("items",[]):
                      conds={c["type"]:c["status"] for c in node.get("status",{}).get("conditions",[])}
                      if conds.get("Ready")=="True":
                        L.info(f"Node ready: {node['metadata']['name']}");node_ready=True;break
                  if node_ready:break
                  L.info(f"No Ready nodes yet, attempt {nd_att+1}");time.sleep(10)
                if not node_ready:
                  reinvoke_or_fail(event,ctx,"No Ready nodes before timeout");return
                # --- Wait for envoy-gateway pods to be Running ---
                L.info("Waiting for envoy-gateway controller to be Running...")
                eg_ready=False
                for eg_att in range(360):
                  if not has_time(120):break
                  token=get_token(sess,cn,region)
                  hd_base={"Authorization":f"Bearer {token}","Accept":"application/json"}
                  r_pods=http.request("GET",f"{ep}/api/v1/namespaces/envoy-gateway-system/pods",headers=hd_base)
                  if r_pods.status==200:
                    pods=json.loads(r_pods.data.decode())
                    running=[p for p in pods.get("items",[]) if p.get("status",{}).get("phase")=="Running"]
                    if running:
                      L.info(f"EnvoyGateway controller running: {len(running)} pods");eg_ready=True;break
                  L.info(f"EnvoyGateway pods not running yet, attempt {eg_att+1}");time.sleep(10)
                if not eg_ready:L.warning("EnvoyGateway controller not ready, continuing anyway")
                # --- Wait for NLB hostname on envoy service ---
                # EnvoyGateway deploys proxy service in envoy-gateway-system, not in the Gateway's namespace
                L.info("Waiting for NLB hostname on envoy service...")
                for lb_att in range(360):
                  if not has_time(120):break
                  token=get_token(sess,cn,region)
                  hd_base={"Authorization":f"Bearer {token}","Accept":"application/json"}
                  for search_ns in ["envoy-gateway-system",ns_val]:
                    r_svcs=http.request("GET",f"{ep}/api/v1/namespaces/{search_ns}/services",headers=hd_base)
                    if r_svcs.status==200:
                      svcs=json.loads(r_svcs.data.decode())
                      for svc in svcs.get("items",[]):
                        sn=svc.get("metadata",{}).get("name","")
                        if "envoy" in sn:
                          ingress=svc.get("status",{}).get("loadBalancer",{}).get("ingress",[])
                          if ingress:
                            nlb_dns=ingress[0].get("hostname","")
                            L.info(f"NLB DNS: {nlb_dns} on svc {sn} in ns {search_ns}");break
                    if nlb_dns:break
                  if nlb_dns:break
                  L.info(f"NLB not ready yet, attempt {lb_att+1}");time.sleep(10)
                if not nlb_dns:
                  reinvoke_or_fail(event,ctx,"NLB hostname not assigned before timeout");return
                # Resolve NLB ARN
                try:
                  elb=sess.client("elbv2")
                  for lb in elb.describe_load_balancers().get("LoadBalancers",[]):
                    if lb.get("DNSName","")==nlb_dns:nlb_arn=lb["LoadBalancerArn"];break
                except Exception as ea:L.warning(f"NLB ARN lookup: {ea}")
              send_cfn(event,ctx,"SUCCESS",data={"Result":json.dumps(results[:5]),"NlbDns":nlb_dns,"NlbArn":nlb_arn},pid=f"{cn}-k8s-{event['LogicalResourceId']}")
            except Exception as e:
              L.exception("fail")
              send_cfn(event,ctx,"FAILED",reason=str(e)[:256])

  # ============================================================================
  # SECTION 6: COGNITO USER POOL + OIDC
  # ============================================================================

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    DependsOn: QuotaCheck
    Properties:
      UserPoolName: !Sub "${ProjectName}${EnvironmentId}"
      UserPoolTier: ESSENTIALS
      AutoVerifiedAttributes:
        - email
      AliasAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: true
          Mutable: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "cnf-${EnvironmentId}-${AWS::AccountId}"
      ManagedLoginVersion: 2
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CognitoUserPoolDomain
    Properties:
      ClientName: !Sub "${ProjectName}${EnvironmentId}-app"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_USER_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - profile
        - email
        - phone
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub "https://${CloudFrontDistribution.DomainName}/auth/oidc/callback"
      LogoutURLs:
        - !Sub "https://${CloudFrontDistribution.DomainName}/auth/oidc/logout"

  CognitoManagedLoginBranding:
    Type: AWS::Cognito::ManagedLoginBranding
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientId: !Ref CognitoUserPoolClient
      UseCognitoProvidedValues: true

  # Pre Token Generation Lambda: maps cognito:groups → groups claim in JWT
  CognitoPreTokenGenFunction:
    Type: AWS::Lambda::Function
    DependsOn: QuotaCheck
    Properties:
      FunctionName: !Sub "${ProjectName}${EnvironmentId}-cognito-pre-token-gen"
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 5
      MemorySize: 128
      Role: !GetAtt KubectlLambdaRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            const groups = event.request?.groupConfiguration?.groupsToOverride ?? [];
            event.response = {
              claimsAndScopeOverrideDetails: {
                accessTokenGeneration: { claimsToAddOrOverride: { groups } },
                idTokenGeneration: { claimsToAddOrOverride: { groups } },
              },
            };
            return event;
          };

  CognitoPreTokenGenPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CognitoPreTokenGenFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  CognitoUserPoolLambdaConfig:
    Type: Custom::CognitoLambdaConfig
    DependsOn:
      - CognitoPreTokenGenPermission
    Properties:
      ServiceToken: !GetAtt CognitoLambdaConfigFunction.Arn
      UserPoolId: !Ref CognitoUserPool
      LambdaArn: !GetAtt CognitoPreTokenGenFunction.Arn
      Region: !Ref "AWS::Region"

  CognitoLambdaConfigFunction:
    Type: AWS::Lambda::Function
    DependsOn: QuotaCheck
    Properties:
      FunctionName: !Sub "${ProjectName}${EnvironmentId}-cognito-lambda-config"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      MemorySize: 128
      Role: !GetAtt KubectlLambdaRole.Arn
      Code:
        ZipFile: |
          import json,logging,boto3,urllib3
          L=logging.getLogger();L.setLevel(logging.INFO)
          def send_cfn(event,ctx,status,reason=None):
            body=json.dumps({"Status":status,"Reason":reason or f"Logs: {ctx.log_stream_name}",
              "PhysicalResourceId":event.get("PhysicalResourceId",ctx.log_stream_name),
              "StackId":event["StackId"],"RequestId":event["RequestId"],
              "LogicalResourceId":event["LogicalResourceId"],"Data":{}})
            urllib3.PoolManager().request("PUT",event["ResponseURL"],body=body.encode(),headers={"Content-Type":""})
          def handler(event,ctx):
            L.info(json.dumps(event,default=str))
            props=event["ResourceProperties"]
            pool_id=props["UserPoolId"];region=props.get("Region",boto3.session.Session().region_name)
            cog=boto3.client("cognito-idp",region_name=region)
            try:
              # Describe current pool to preserve existing settings
              pool=cog.describe_user_pool(UserPoolId=pool_id)['UserPool']
              lc=pool.get('LambdaConfig',{})
              if event["RequestType"]=="Delete":
                lc.pop('PreTokenGeneration',None);lc.pop('PreTokenGenerationConfig',None)
              else:
                lc['PreTokenGenerationConfig']={"LambdaArn":props["LambdaArn"],"LambdaVersion":"V3_0"}
              cog.update_user_pool(UserPoolId=pool_id,LambdaConfig=lc)
              send_cfn(event,ctx,"SUCCESS")
            except Exception as e:
              L.exception("fail");send_cfn(event,ctx,"FAILED",reason=str(e)[:256])

  CognitoAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref CognitoUserPool
      Description: Administrator group

  # Lambda to create Cognito admin user
  CognitoUserCreatorFunction:
    Type: AWS::Lambda::Function
    DependsOn: QuotaCheck
    Properties:
      FunctionName: !Sub "${ProjectName}${EnvironmentId}-cognito-user-creator"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      MemorySize: 128
      Role: !GetAtt KubectlLambdaRole.Arn
      Code:
        ZipFile: |
          import json,logging,boto3,secrets,string,urllib3
          L=logging.getLogger();L.setLevel(logging.INFO)
          def gen_pwd(length=16):
            chars=string.ascii_letters+string.digits+"!@#$%^&*()"
            while True:
              pwd=''.join(secrets.choice(chars) for _ in range(length))
              if (any(c.islower() for c in pwd) and any(c.isupper() for c in pwd) and 
                  any(c.isdigit() for c in pwd) and any(c in "!@#$%^&*()" for c in pwd)):
                return pwd
          def send_cfn(event,ctx,status,data=None,reason=None,pid=None):
            body=json.dumps({"Status":status,"Reason":reason or f"Logs: {ctx.log_stream_name}",
              "PhysicalResourceId":pid or event.get("PhysicalResourceId",ctx.log_stream_name),
              "StackId":event["StackId"],"RequestId":event["RequestId"],
              "LogicalResourceId":event["LogicalResourceId"],"Data":data or {}})
            urllib3.PoolManager().request("PUT",event["ResponseURL"],body=body.encode(),headers={"Content-Type":""})
          def handler(event,ctx):
            L.info(json.dumps(event,default=str))
            rt=event["RequestType"];props=event["ResourceProperties"]
            if rt=="Delete":
              send_cfn(event,ctx,"SUCCESS",pid="cognito-admin-user");return
            try:
              pool_id=props["UserPoolId"];username=props.get("Username","admin@example.com")
              region=props.get("Region",boto3.session.Session().region_name)
              cog=boto3.client("cognito-idp",region_name=region)
              password=gen_pwd(16)
              uname=username.split("@")[0]
              try:
                cog.admin_create_user(UserPoolId=pool_id,Username=uname,
                  TemporaryPassword=password,MessageAction="SUPPRESS",
                  UserAttributes=[{"Name":"email","Value":username},
                    {"Name":"email_verified","Value":"true"},
                    {"Name":"name","Value":uname.replace("."," ").title()}])
                L.info(f"Created user {username}")
              except cog.exceptions.UsernameExistsException:
                L.info(f"User {uname} already exists, resetting password")
              cog.admin_set_user_password(UserPoolId=pool_id,Username=uname,
                Password=password,Permanent=True)
              L.info(f"Set permanent password for {uname}")
              group=props.get("GroupName")
              if group:
                cog.admin_add_user_to_group(UserPoolId=pool_id,Username=uname,GroupName=group)
                L.info(f"Added {uname} to group {group}")
              send_cfn(event,ctx,"SUCCESS",data={"Username":username,"Password":password},pid="cognito-admin-user")
            except Exception as e:
              L.exception("fail");send_cfn(event,ctx,"FAILED",reason=str(e)[:256])

  CognitoAdminUser:
    Type: Custom::CognitoUser
    DependsOn:
      - CognitoUserPool
